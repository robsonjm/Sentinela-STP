<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sentinela STP - Mural e Jornalismo Popular</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap');
        :root { --sat: env(safe-area-inset-top, 0px); --sab: env(safe-area-inset-bottom, 0px); }
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        
        /* Nav Bar Styles from index.html */
        .nav-link.active { color: #1d4ed8; }
        .nav-link.active i { color: #1d4ed8; fill: #dbeafe; }
        main { padding-bottom: calc(5rem + var(--sab)); }

        .feedback-card {
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            animation: fadeInScale 0.6s ease-out forwards;
        }
        
        /* Estilo Especial para o Jornalismo Investigativo */
        .editorial-card {
            background: linear-gradient(to bottom right, #1e3a8a, #1d4ed8);
            color: white;
            border: none;
            box-shadow: 0 20px 25px -5px rgba(29, 78, 216, 0.2);
        }

        @keyframes fadeInScale {
            from { opacity: 0; transform: translateY(30px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .live-dot {
            width: 10px; height: 10px;
            background-color: #ef4444;
            border-radius: 50%;
            display: inline-block;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.6); opacity: 0.4; }
            100% { transform: scale(1); opacity: 1; }
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        /* Carousel Snap Styles */
        .snap-x-mandatory {
            scroll-snap-type: x mandatory;
            scroll-behavior: smooth;
        }
        .snap-center {
            scroll-snap-align: center;
        }

        /* Animação do Ícone Flutuante */
        @keyframes floatIcon {
            0% { transform: translateY(0) scale(1) rotate(0deg); opacity: 0.15; }
            50% { transform: translateY(-15px) scale(1.1) rotate(5deg); opacity: 0.3; }
            100% { transform: translateY(0) scale(1) rotate(0deg); opacity: 0.15; }
        }

        .animated-icon {
            animation: floatIcon 6s ease-in-out infinite;
            filter: drop-shadow(0 0 20px rgba(255,255,255,0.4));
        }
        
        /* Ícone da Timeline */
        @keyframes pulseIcon {
            0% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.1); opacity: 1; }
            100% { transform: scale(1); opacity: 0.8; }
        }
        
        .timeline-icon {
            animation: pulseIcon 3s ease-in-out infinite;
        }

        .glass-header {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(226, 232, 240, 0.8);
        }

        .video-wrap { position: relative; width: 100%; padding-top: 56.25%; }
        .video-wrap iframe { position: absolute; inset: 0; width: 100%; height: 100%; border: 0; }
    </style>
</head>
<body class="min-h-screen pb-20">

    <!-- Cabeçalho Fixo Padronizado -->
    <header class="bg-blue-700 text-white px-6 py-4 shadow-lg sticky top-0 z-[100]">
        <div class="max-w-4xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="bg-white/10 p-2 rounded-xl text-white backdrop-blur-sm">
                    <i data-lucide="newspaper" size="20"></i>
                </div>
                <div>
                    <h1 class="text-lg font-black tracking-tighter uppercase leading-none">Sentinela STP</h1>
                    <p class="text-[10px] font-bold text-blue-200 uppercase tracking-widest text-left">Mural & Central de Notícias</p>
                </div>
            </div>
            <div class="flex items-center gap-4">
                <div class="flex items-center gap-2 bg-blue-800/50 px-4 py-2 rounded-full border border-blue-400/30">
                    <span class="live-dot bg-red-500"></span>
                    <span class="text-[10px] font-black uppercase text-white tracking-widest">Feed Ativo</span>
                </div>
            </div>
        </div>
    </header>

    <main class="max-w-4xl mx-auto p-6 md:pt-12">
        
        <!-- Área de Destaque Jornalístico (Dinâmica) -->
        <section id="editorial-section" class="mb-12">
            <div class="flex items-center justify-between mb-6">
                <div class="flex items-center gap-2">
                    <i data-lucide="search" class="text-blue-600" size="18"></i>
                    <h3 class="text-xs font-black uppercase tracking-[0.2em] text-slate-400">Investigação Sentinela</h3>
                </div>
                <!-- Indicadores do Carousel (opcional) -->
                <div id="carousel-dots" class="flex gap-1"></div>
            </div>
            
            <div id="editorial-carousel" class="flex overflow-x-auto snap-x-mandatory no-scrollbar gap-4 pb-4 -mx-6 px-6 md:mx-0 md:px-0">
                <!-- Conteúdo injetado via JS -->
                <div class="w-full shrink-0 snap-center editorial-card p-8 rounded-[2.5rem] relative overflow-hidden min-h-[300px] flex items-center justify-center">
                    <i data-lucide="loader-2" class="animate-spin text-white/50" size="32"></i>
                </div>
            </div>
        </section>

        <!-- Divisor -->
        <div class="flex items-center gap-4 mb-8">
            <div class="h-px bg-slate-200 flex-1"></div>
            <span class="text-[10px] font-black text-slate-300 uppercase tracking-[0.3em]">Relatos em Tempo Real</span>
            <div class="h-px bg-slate-200 flex-1"></div>
        </div>

        <!-- Filtros e Controles -->
        <div class="bg-white p-4 rounded-2xl border border-slate-200 shadow-sm mb-8">
            <div class="flex flex-col md:flex-row gap-4 justify-between items-center">
                <div class="flex items-center gap-2 w-full md:w-auto">
                    <i data-lucide="filter" class="text-slate-400" size="16"></i>
                    <span class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Filtrar por:</span>
                </div>
                
                <div class="flex flex-col sm:flex-row gap-3 w-full md:w-auto">
                    <select id="filter-zone" class="bg-slate-50 border border-slate-200 text-slate-600 text-xs font-bold rounded-lg px-3 py-2 outline-none focus:ring-2 focus:ring-blue-500 uppercase tracking-wide">
                        <option value="">Todas as Zonas</option>
                        <option value="Norte">Zona Norte</option>
                        <option value="Sul">Zona Sul</option>
                        <option value="Leste">Zona Leste</option>
                        <option value="Oeste">Zona Oeste</option>
                        <option value="Centro">Centro</option>
                    </select>

                    <input type="text" id="filter-line" placeholder="Linha (Ex: 8615)" class="bg-slate-50 border border-slate-200 text-slate-600 text-xs font-bold rounded-lg px-3 py-2 outline-none focus:ring-2 focus:ring-blue-500 uppercase tracking-wide">
                    
                    <button id="apply-filters" class="bg-blue-600 text-white px-4 py-2 rounded-lg text-xs font-black uppercase tracking-widest hover:bg-blue-700 transition-colors flex items-center justify-center gap-2">
                        Aplicar <i data-lucide="arrow-right" size="14"></i>
                    </button>
                </div>
            </div>
        </div>

        <!-- Feed de Relatos -->
        <div id="infinite-feed" class="space-y-8">
            <div id="initial-loader" class="flex flex-col items-center justify-center py-20 text-slate-300">
                <i data-lucide="loader-2" class="animate-spin mb-4" size="48"></i>
                <p class="font-bold uppercase text-xs tracking-widest">Conectando ao banco de dados...</p>
            </div>
        </div>

        <!-- Sentinela de Scroll -->
        <div id="scroll-anchor" class="h-20 flex items-center justify-center mt-12">
            <div id="load-more-loader" class="hidden text-slate-400 flex items-center gap-2">
                <i data-lucide="refresh-cw" class="animate-spin" size="16"></i>
                <span class="text-[10px] font-black uppercase tracking-widest">Buscando histórico...</span>
            </div>
        </div>
    </main>

    <!-- Barra de Navegação Padrão -->
    <nav class="fixed bottom-0 left-0 right-0 bg-white border-t border-slate-100 py-2 px-2 pb-[calc(0.5rem+var(--sab))] z-50">
        <div class="flex justify-between items-center w-full max-w-md mx-auto">
            <a href="index.html" class="nav-link flex flex-col items-center gap-1 text-slate-300 hover:text-slate-500 transition-colors p-2">
                <i data-lucide="home" size="20"></i>
                <span class="text-[9px] font-black uppercase">Início</span>
            </a>
            <a href="feed.html" class="nav-link active flex flex-col items-center gap-1 text-blue-600 transition-colors p-2 rounded-xl bg-blue-50">
                <i data-lucide="message-square" size="20" class="fill-current"></i>
                <span class="text-[9px] font-black uppercase">Feed</span>
            </a>
            <a href="painel.html" class="nav-link flex flex-col items-center gap-1 text-slate-300 hover:text-slate-500 transition-colors p-2">
                <i data-lucide="bar-chart" size="20"></i>
                <span class="text-[9px] font-black uppercase">Painel</span>
            </a>
            <a href="patronos.html" class="nav-link flex flex-col items-center gap-1 text-slate-300 hover:text-slate-500 transition-colors p-2">
                <i data-lucide="users" size="20"></i>
                <span class="text-[9px] font-black uppercase">Patronos</span>
            </a>
            <a href="landpage.html" class="nav-link flex flex-col items-center gap-1 text-slate-300 hover:text-slate-500 transition-colors p-2">
                <i data-lucide="info" size="20"></i>
                <span class="text-[9px] font-black uppercase">Sobre</span>
            </a>
        </div>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { initializeFirestore, collection, query, orderBy, limit, onSnapshot, getDocs, startAfter, where, doc, updateDoc, increment, getDoc, setDoc, deleteDoc, runTransaction } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { firebaseConfig } from "./js/config.js?v=3";

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = initializeFirestore(app, { experimentalAutoDetectLongPolling: true, useFetchStreams: false });
        
        const container = document.getElementById('infinite-feed');
        const scrollAnchor = document.getElementById('scroll-anchor');
        const loadMoreLoader = document.getElementById('load-more-loader');
        const editorialCarousel = document.getElementById('editorial-carousel');
        const carouselDots = document.getElementById('carousel-dots');
        
        // Filtros UI
        const filterZone = document.getElementById('filter-zone');
        const filterLine = document.getElementById('filter-line');
        const applyFiltersBtn = document.getElementById('apply-filters');

        const HISTORY_PREFETCH_PX = 1400;
        const HISTORY_PAGE_EVIDENCIAS = 10;
        const HISTORY_PAGE_ARTIGOS = 6;
        const REACTION_WEIGHT_MS = 60000;
        const HYPE_THRESHOLD = 5;

        let lastVisible = null;
        let lastVisibleNews = null;
        let isLoadingMore = false;
        let hasMore = true;
        let hasMoreNews = true;
        let unsubscribeLiveFeed = null;
        let unsubscribeNewsFeed = null; // Listener para notícias na timeline
        let currentFilters = {};

        // --- SISTEMA JORNALÍSTICO (CAROUSEL) ---
        const loadEditorialCarousel = () => {
            const qArtigo = query(
                collection(db, 'artifacts', 'sentinela-stp', 'public', 'data', 'artigos'),
                orderBy('timestamp', 'desc'),
                limit(5)
            );

            onSnapshot(qArtigo, (snapshot) => {
                editorialCarousel.innerHTML = '';
                carouselDots.innerHTML = '';

                if (snapshot.empty) {
                    editorialCarousel.innerHTML = `
                        <div class="w-full shrink-0 snap-center editorial-card p-8 rounded-[2.5rem] relative overflow-hidden group cursor-pointer">
                            <div class="relative z-10 text-left">
                                <span class="bg-blue-400/30 text-[10px] font-black uppercase px-3 py-1 rounded-full border border-white/20 mb-4 inline-block">Boas-vindas</span>
                                <h2 class="text-3xl font-black tracking-tight mb-4">A Sentinela está nas ruas.</h2>
                                <p class="text-blue-100 text-sm font-medium leading-relaxed">
                                    Use o app para registrar ruído e calor. Em breve, traremos investigações profundas.
                                </p>
                            </div>
                        </div>
                    `;
                    lucide.createIcons();
                    return;
                }

                snapshot.docs.forEach((doc, index) => {
                    const data = doc.data();
                    const safeIcon = sanitizeLucideName(data.icone, 'mic');
                    const safeCategoria = escapeHtml(data.categoria || 'Reportagem');
                    const safeTitulo = escapeHtml(data.titulo || '');
                    const safeResumo = escapeHtml(data.resumo || '');
                    const safeLink = sanitizeHref(data.link || '#');
                    const safeDataStr = escapeHtml(data.data_str || 'Recentemente');
                    const card = document.createElement('div');
                    // Removida a classe 'group-hover:scale-110' do ícone para evitar conflito com animação CSS
                    card.className = "w-full shrink-0 snap-center editorial-card p-8 rounded-[2.5rem] relative overflow-hidden group cursor-pointer transition-all";
                    
                    // Ícone Maior e Animado
                    card.innerHTML = `
                        <div class="absolute -top-12 -right-12 p-0 z-0 pointer-events-none overflow-visible">
                            <div class="animated-icon text-white">
                                <i data-lucide="${safeIcon}" width="280" height="280" stroke-width="0.8"></i>
                            </div>
                        </div>
                        <div class="relative z-10 max-w-2xl text-left h-full flex flex-col justify-between">
                            <div>
                                <span class="bg-blue-400/30 text-[10px] font-black uppercase px-3 py-1 rounded-full border border-white/20 mb-4 inline-block backdrop-blur-md">${safeCategoria}</span>
                                <h2 class="text-2xl md:text-3xl font-black tracking-tight mb-2 leading-tight drop-shadow-sm line-clamp-2">${safeTitulo}</h2>
                                <p class="text-blue-100 text-xs md:text-sm font-medium leading-relaxed mb-4 line-clamp-3">
                                    ${safeResumo}
                                </p>
                            </div>
                            <div class="flex items-center gap-4 mt-auto">
                                <a href="${safeLink}" class="bg-white text-blue-700 px-5 py-2.5 rounded-2xl font-black uppercase text-[9px] tracking-widest hover:bg-blue-50 transition-all shadow-lg shadow-blue-900/20">Ler Tudo</a>
                                <span class="text-[9px] font-bold text-blue-200">Publicado em ${safeDataStr}</span>
                            </div>
                        </div>
                    `;
                    editorialCarousel.appendChild(card);

                    // Indicador (Dot)
                    const dot = document.createElement('div');
                    dot.className = `w-1.5 h-1.5 rounded-full transition-all cursor-pointer ${index === 0 ? 'bg-blue-600 w-3' : 'bg-slate-300'}`;
                    // Permitir clique nos dots
                    dot.onclick = () => {
                        editorialCarousel.scrollTo({
                            left: card.offsetLeft,
                            behavior: 'smooth'
                        });
                        resetAutoScroll(); // Reinicia o timer ao interagir
                    };
                    carouselDots.appendChild(dot);
                });

                // --- Auto Scroll & Interatividade Desktop ---
                let autoScrollInterval;
                const scrollDelay = 5000; // 5 segundos por slide

                const startAutoScroll = () => {
                    clearInterval(autoScrollInterval);
                    autoScrollInterval = setInterval(() => {
                        const width = editorialCarousel.offsetWidth;
                        const scrollLeft = editorialCarousel.scrollLeft;
                        const maxScroll = editorialCarousel.scrollWidth - width;
                        
                        // Se chegou no fim, volta pro começo
                        if (scrollLeft >= maxScroll - 10) { // -10 margem de erro
                            editorialCarousel.scrollTo({ left: 0, behavior: 'smooth' });
                        } else {
                            editorialCarousel.scrollBy({ left: width, behavior: 'smooth' });
                        }
                    }, scrollDelay);
                };

                const stopAutoScroll = () => clearInterval(autoScrollInterval);
                const resetAutoScroll = () => {
                    stopAutoScroll();
                    startAutoScroll();
                };

                // Iniciar Auto Scroll
                startAutoScroll();

                // Parar ao passar o mouse (Desktop) ou tocar (Mobile)
                editorialCarousel.addEventListener('mouseenter', stopAutoScroll);
                editorialCarousel.addEventListener('mouseleave', startAutoScroll);
                editorialCarousel.addEventListener('touchstart', stopAutoScroll);
                editorialCarousel.addEventListener('touchend', startAutoScroll);

                // Lógica de Arrastar com Mouse (Desktop Drag-to-Scroll)
                let isDown = false;
                let startX;
                let scrollLeft;

                editorialCarousel.addEventListener('mousedown', (e) => {
                    isDown = true;
                    editorialCarousel.classList.add('cursor-grabbing');
                    editorialCarousel.classList.remove('cursor-grab');
                    startX = e.pageX - editorialCarousel.offsetLeft;
                    scrollLeft = editorialCarousel.scrollLeft;
                    stopAutoScroll(); // Para enquanto arrasta
                });

                editorialCarousel.addEventListener('mouseleave', () => {
                    isDown = false;
                    editorialCarousel.classList.remove('cursor-grabbing');
                    startAutoScroll(); // Retoma se sair
                });

                editorialCarousel.addEventListener('mouseup', () => {
                    isDown = false;
                    editorialCarousel.classList.remove('cursor-grabbing');
                    startAutoScroll(); // Retoma ao soltar
                });

                editorialCarousel.addEventListener('mousemove', (e) => {
                    if (!isDown) return;
                    e.preventDefault();
                    const x = e.pageX - editorialCarousel.offsetLeft;
                    const walk = (x - startX) * 2; // Velocidade do scroll
                    editorialCarousel.scrollLeft = scrollLeft - walk;
                });

                // Scroll Handler para atualizar Dots (Mantido)
                editorialCarousel.onscroll = () => {
                    const scrollLeft = editorialCarousel.scrollLeft;
                    const width = editorialCarousel.offsetWidth;
                    // Melhor precisão no cálculo do índice atual
                    const index = Math.round(scrollLeft / width);
                    
                    Array.from(carouselDots.children).forEach((d, i) => {
                        d.className = `w-1.5 h-1.5 rounded-full transition-all cursor-pointer ${i === index ? 'bg-blue-600 w-3' : 'bg-slate-300'}`;
                    });
                };

                lucide.createIcons();
            });
        };

        const createNewsFeedCard = (item) => {
            const el = document.createElement('div');
            el.className = "bg-slate-900 border-l-4 border-blue-500 rounded-xl p-4 mb-4 shadow-md relative overflow-hidden group";
            
            // Timestamp seguro
            if (item.timestamp && item.timestamp.seconds) {
                el.dataset.timestamp = item.timestamp.seconds * 1000;
            } else if (item.timestamp) {
                el.dataset.timestamp = item.timestamp;
            } else {
                el.dataset.timestamp = Date.now();
            }
            
            // Fundo Sutil Animado
            const safeIcon = sanitizeLucideName(item.icone, 'newspaper');
            const safeCategoria = escapeHtml(item.categoria || 'Notícia');
            const safeDataStr = escapeHtml(item.data_str || 'Agora');
            const safeTitulo = escapeHtml(item.titulo || '');
            const safeResumo = escapeHtml(item.resumo || '');
            const safeLink = sanitizeHref(item.link || '#');
            const embed = extractFirstEmbedFromHtml(item.conteudo_html || '') || getEmbedFromLink(item.link || '');
            const embedHtml = embed ? `<div class="mt-3 mb-3">${embed.html}</div>` : '';
            el.innerHTML = `
                <div class="absolute -right-6 -bottom-6 text-blue-800/20 group-hover:text-blue-700/30 transition-all duration-500 timeline-icon">
                    <i data-lucide="${safeIcon}" width="120" height="120" stroke-width="1.5"></i>
                </div>
                <div class="relative z-10">
                    <div class="flex items-center gap-2 mb-2">
                        <span class="bg-blue-600 text-white text-[10px] font-black uppercase px-2 py-0.5 rounded-md tracking-wider">
                            ${safeCategoria}
                        </span>
                        <span class="text-slate-400 text-[10px] font-bold uppercase tracking-widest flex items-center gap-1">
                            <i data-lucide="clock" size="10"></i>
                            ${safeDataStr}
                        </span>
                    </div>
                    ${embedHtml}
                    <h3 class="text-lg font-bold text-white mb-2 leading-tight">${safeTitulo}</h3>
                    <p class="text-slate-300 text-xs leading-relaxed mb-3 line-clamp-3 w-[85%]">
                        ${safeResumo}
                    </p>
                    <a href="${safeLink}" class="inline-flex items-center gap-1 text-blue-400 text-[10px] font-black uppercase tracking-widest hover:text-blue-300 transition-colors">
                        Ler Reportagem <i data-lucide="arrow-right" size="10"></i>
                    </a>
                </div>
            `;
            setTimeout(() => ensureEmbedsProcessed(el), 0);
            return el;
        };

        const insertSorted = (container, element) => {
            const getOrder = (el) => {
                const ok = parseInt(el.dataset.orderKey || 0);
                if (Number.isFinite(ok) && ok > 0) return ok;
                return parseInt(el.dataset.timestamp || 0) || 0;
            };
            const orderKey = getOrder(element);
            const children = Array.from(container.children);
            const nextElement = children.find((child) => {
                if (!child.dataset) return false;
                return getOrder(child) < orderKey;
            });
            if (nextElement) container.insertBefore(element, nextElement);
            else container.appendChild(element);
        };

        // Configuração de Reações
        const REACTION_TYPES = {
            angry: { icon: '😡', label: 'Indignado' },
            sad: { icon: '😢', label: 'Triste' },
            support: { icon: '✊', label: 'Apoio' },
            noise: { icon: '📢', label: 'Barulho' }
        };

        const getUserId = () => {
            const u = auth.currentUser;
            return u && u.uid ? u.uid : null;
        };

        function escapeHtml(value) {
            const s = value == null ? '' : String(value);
            return s.replace(/[&<>"']/g, (c) => {
                if (c === '&') return '&amp;';
                if (c === '<') return '&lt;';
                if (c === '>') return '&gt;';
                if (c === '"') return '&quot;';
                return '&#39;';
            });
        }

        function sanitizeHref(value) {
            const s = value == null ? '' : String(value).trim();
            if (!s) return '#';
            if (s.startsWith('#')) return s;
            if (s.startsWith('/') || s.startsWith('./') || s.startsWith('../')) return s;

            try {
                const u = new URL(s, window.location.origin);
                if (u.protocol !== 'http:' && u.protocol !== 'https:') return '#';
                return u.toString();
            } catch {
                return '#';
            }
        }

        function getEmbedFromLink(href) {
            const safeHref = sanitizeHref(href);
            if (!safeHref || safeHref === '#') return null;
            let u;
            try { u = new URL(safeHref, window.location.origin); } catch { return null; }
            const host = (u.hostname || '').toLowerCase();
            const path = u.pathname || '';

            const isYouTube = host === 'youtu.be' || host.endsWith('youtube.com') || host.endsWith('youtube-nocookie.com');
            if (isYouTube) {
                let id = '';
                if (host === 'youtu.be') id = path.replace('/', '').split('/')[0] || '';
                if (!id && u.searchParams.get('v')) id = u.searchParams.get('v') || '';
                if (!id && path.startsWith('/shorts/')) id = path.split('/shorts/')[1]?.split('/')[0] || '';
                if (!id && path.startsWith('/embed/')) id = path.split('/embed/')[1]?.split('/')[0] || '';
                id = id.replace(/[^a-zA-Z0-9_-]/g, '');
                if (!id) return null;
                const src = `https://www.youtube-nocookie.com/embed/${id}`;
                return { type: 'iframe', html: `<div class="video-wrap rounded-2xl overflow-hidden border border-white/10"><iframe src="${src}" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" allowfullscreen></iframe></div>` };
            }

            const isVimeo = host.endsWith('vimeo.com') || host.endsWith('player.vimeo.com');
            if (isVimeo) {
                const m = safeHref.match(/vimeo\.com\/(?:video\/)?(\d+)/i);
                const id = m && m[1] ? m[1] : '';
                if (!id) return null;
                const src = `https://player.vimeo.com/video/${id}`;
                return { type: 'iframe', html: `<div class="video-wrap rounded-2xl overflow-hidden border border-white/10"><iframe src="${src}" allow="autoplay; fullscreen; picture-in-picture" allowfullscreen></iframe></div>` };
            }

            const isTikTok = host.endsWith('tiktok.com');
            if (isTikTok) {
                const m = safeHref.match(/\/video\/(\d+)/i);
                const videoId = m && m[1] ? m[1] : '';
                const idAttr = videoId ? ` data-video-id="${escapeHtml(videoId)}"` : '';
                const cite = escapeHtml(safeHref);
                return { type: 'tiktok', html: `<div class="rounded-2xl overflow-hidden border border-white/10 bg-slate-950/30 p-2"><blockquote class="tiktok-embed" cite="${cite}"${idAttr} style="max-width: 605px;min-width: 325px;"><section></section></blockquote></div>` };
            }

            const isInstagram = host.endsWith('instagram.com');
            if (isInstagram) {
                const hrefClean = safeHref.split('?')[0];
                const permalink = escapeHtml(hrefClean.endsWith('/') ? hrefClean : `${hrefClean}/`);
                return { type: 'instagram', html: `<div class="rounded-2xl overflow-hidden border border-white/10 bg-slate-950/30 p-2"><blockquote class="instagram-media" data-instgrm-permalink="${permalink}" data-instgrm-version="14" style="width: 100%;"></blockquote></div>` };
            }

            return null;
        }

        function extractFirstEmbedFromHtml(html) {
            const s = html == null ? '' : String(html);
            if (!s.trim()) return null;
            const doc = new DOMParser().parseFromString(s, 'text/html');
            const iframe = doc.querySelector('iframe[src]');
            if (iframe) {
                const src = iframe.getAttribute('src') || '';
                try {
                    const u = new URL(src, window.location.origin);
                    const host = (u.hostname || '').toLowerCase();
                    const isAllowed = host.endsWith('youtube.com') || host.endsWith('youtube-nocookie.com') || host.endsWith('player.vimeo.com');
                    if (isAllowed) {
                        const safeSrc = u.toString();
                        return { type: 'iframe', html: `<div class="video-wrap rounded-2xl overflow-hidden border border-white/10"><iframe src="${safeSrc}" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" allowfullscreen></iframe></div>` };
                    }
                } catch {}
            }
            const tt = doc.querySelector('blockquote.tiktok-embed');
            if (tt) {
                const cite = sanitizeHref(tt.getAttribute('cite') || '');
                const id = (tt.getAttribute('data-video-id') || '').replace(/[^\d]/g, '');
                const idAttr = id ? ` data-video-id="${escapeHtml(id)}"` : '';
                const citeAttr = cite && cite !== '#' ? escapeHtml(cite) : '';
                if (citeAttr) return { type: 'tiktok', html: `<div class="rounded-2xl overflow-hidden border border-white/10 bg-slate-950/30 p-2"><blockquote class="tiktok-embed" cite="${citeAttr}"${idAttr} style="max-width: 605px;min-width: 325px;"><section></section></blockquote></div>` };
            }
            const ig = doc.querySelector('blockquote.instagram-media');
            if (ig) {
                const permalink = sanitizeHref(ig.getAttribute('data-instgrm-permalink') || '');
                const href = permalink && permalink !== '#' ? escapeHtml(permalink) : '';
                if (href) return { type: 'instagram', html: `<div class="rounded-2xl overflow-hidden border border-white/10 bg-slate-950/30 p-2"><blockquote class="instagram-media" data-instgrm-permalink="${href}" data-instgrm-version="14" style="width: 100%;"></blockquote></div>` };
            }
            return null;
        }

        function ensureEmbedsProcessed(root) {
            if (!root) return;
            if (root.querySelector('.instagram-media')) {
                if (!document.querySelector('script[src="https://www.instagram.com/embed.js"]')) {
                    const s = document.createElement('script');
                    s.src = 'https://www.instagram.com/embed.js';
                    s.async = true;
                    document.body.appendChild(s);
                    s.onload = () => { try { if (window.instgrm) window.instgrm.Embeds.process(); } catch {} };
                } else {
                    try { if (window.instgrm) window.instgrm.Embeds.process(); } catch {}
                }
            }
            if (root.querySelector('.tiktok-embed')) {
                if (!document.querySelector('script[src="https://www.tiktok.com/embed.js"]')) {
                    const s = document.createElement('script');
                    s.src = 'https://www.tiktok.com/embed.js';
                    s.async = true;
                    document.body.appendChild(s);
                }
            }
        }

        function sanitizeLucideName(value, fallback) {
            const s = value == null ? '' : String(value).trim();
            if (!s) return fallback;
            return /^[a-z0-9-]+$/i.test(s) ? s : fallback;
        }

        const createCard = (item, isNew = false) => {
            if (!item.relato_pessoal || item.relato_pessoal.trim() === "") return null;

            const card = document.createElement('div');
            card.className = `feedback-card bg-white p-8 rounded-[2.5rem] border border-slate-200 shadow-sm relative ${isNew ? 'ring-2 ring-blue-500 ring-offset-4' : ''}`;
            
            // Timestamp para ordenação
            if (item.timestamp) {

                card.dataset.timestamp = 0;
            }

            const dbVal = parseInt(item.ruido_db) || 0;

            // Reações
            const reactions = item.reactions || {};

            const shareBtn = `

                    <i data-lucide="share-2" size="12"></i> Compartilhar
                </button>
            `;

            card.innerHTML = `
                <div class="flex justify-between items-start mb-6 text-left">
                    <div>
                        <p class="text-[10px] font-black text-blue-600 uppercase mb-1">Veículo #${safePrefixo}</p>
                        <h4 class="text-sm font-bold text-slate-800 uppercase leading-none text-left">${safeLinha}</h4>
                    </div>
                    <div class="flex flex-col items-end gap-2">
                        <span class="${noiseColor} text-white text-[10px] font-black px-3 py-1 rounded-full shadow-sm">${dbVal}dB</span>
                        <span class="text-[10px] font-bold text-blue-500 bg-blue-50 px-2 py-0.5 rounded-md border border-blue-100">${safeTemp}°C</span>
                    </div>
                </div>
                <div class="flex items-center justify-between mb-4">
                    <div class="flex items-center gap-2">${hypeBadge}</div>
                    <div class="flex items-center gap-2">
                        <span class="text-[9px] font-black text-slate-400 uppercase tracking-widest">Impulso</span>
                        <div class="w-28 h-2 bg-slate-100 rounded-full overflow-hidden">
                            <div class="h-full bg-blue-500" style="width: ${Math.min(100, totalReactions * 12)}%"></div>

                    </div>
                </div>
                <div class="bg-slate-50 p-6 rounded-[2rem] border border-slate-100 relative mb-6 text-left">

                <!-- Barra de Reações -->

                    <div class="flex items-center gap-2 overflow-x-auto no-scrollbar p-1">
                        ${reactionsHtml}
                    </div>

                <div class="flex justify-between items-center text-[11px] font-black text-slate-400 uppercase tracking-widest pt-4 border-t border-slate-100">
                    <div class="flex items-center gap-4">
                        <span class="flex items-center gap-1"><i data-lucide="calendar" size="12"></i> ${safeData}</span>
                        <span class="flex items-center gap-1"><i data-lucide="clock" size="12"></i> ${safeHora}</span>
                    </div>
                    <div class="flex items-center gap-2">
                        <span class="flex items-center gap-1"><i data-lucide="map-pin" size="12"></i> ${safeZona}</span>
                        ${shareBtn}

        window.handleReaction = async (event, docId, emojiType) => {
            const userId = getUserId();
            if (!userId) {
                window.showToast ? window.showToast("Conectando... tente novamente") : alert("Conectando... tente novamente");
                return;
            }

            const btn = event.currentTarget;
            const container = btn.parentElement;
            const storageKey = `reacted_${docId}_${userId}`;
            const previousReaction = localStorage.getItem(storageKey);
            
            // --- ATUALIZAÇÃO OTIMISTA DA UI ---
            // 1. Reverter estado visual do botão anteriormente ativo (se houver e for diferente)
            if (previousReaction && previousReaction !== emojiType) {
                const prevBtn = container.querySelector(`button[data-emoji-type="${previousReaction}"]`);
                if (prevBtn) {
                    // Resetar estilos
                    prevBtn.className = 'reaction-btn group flex items-center gap-2 px-3 py-1.5 rounded-xl transition-all duration-200 border border-transparent bg-slate-50 hover:bg-slate-100 grayscale opacity-60 hover:grayscale-0 hover:opacity-100';
                    const prevCountSpan = prevBtn.querySelector('.count-span');
                    prevCountSpan.className = 'count-span text-[10px] font-black text-slate-500';
                    
                    // Decrementar contador
                    let prevCount = parseInt(prevCountSpan.innerText) || 0;
                    prevCount = Math.max(0, prevCount - 1);
                    prevCountSpan.innerText = prevCount > 0 ? prevCount : '';
                }
            }

            // 2. Atualizar estado do botão clicado
            const isActive = previousReaction === emojiType; // Se já estava ativo, é um toggle OFF
            const countSpan = btn.querySelector('.count-span');
            let currentCount = parseInt(countSpan.innerText) || 0;

            if (isActive) {
                // TOGGLE OFF: Remover estilos e decrementar
                btn.className = 'reaction-btn group flex items-center gap-2 px-3 py-1.5 rounded-xl transition-all duration-200 border border-transparent bg-slate-50 hover:bg-slate-100 grayscale opacity-60 hover:grayscale-0 hover:opacity-100';
                countSpan.className = 'count-span text-[10px] font-black text-slate-500';
                currentCount = Math.max(0, currentCount - 1);
                localStorage.removeItem(storageKey); // Atualiza localstorage otimistamente também
            } else {
                // TOGGLE ON: Adicionar estilos e incrementar
                btn.className = 'reaction-btn group flex items-center gap-2 px-3 py-1.5 rounded-xl transition-all duration-200 border border-transparent bg-blue-50 ring-2 ring-blue-500 grayscale-0 opacity-100';
                countSpan.className = 'count-span text-[10px] font-black text-blue-700';
                currentCount++;
                localStorage.setItem(storageKey, emojiType); // Atualiza localstorage otimistamente
            }
            countSpan.innerText = currentCount > 0 ? currentCount : '';

            // --- FIM DA ATUALIZAÇÃO OTIMISTA ---
            
            try {
                const docRef = doc(db, 'artifacts', 'sentinela-stp', 'public', 'data', 'evidencias', docId);
                const interactionRef = doc(docRef, 'interactions', userId);
                let action = 'set';

                await runTransaction(db, async (transaction) => {
                    const interactionDoc = await transaction.get(interactionRef);
                    const currentData = interactionDoc.exists() ? interactionDoc.data() : null;
                    
                    if (currentData && currentData.emoji === emojiType) {
                        // Toggle Off (Remover reação)
                        transaction.delete(interactionRef);
                        transaction.update(docRef, { [`reactions.${emojiType}`]: increment(-1) });
                        action = 'remove';
                    } else {
                        // Nova reação ou Troca
                        if (currentData) {
                            // Troca: remove anterior
                            transaction.update(docRef, { [`reactions.${currentData.emoji}`]: increment(-1) });
                        }
                        // Adiciona nova
                        transaction.set(interactionRef, { emoji: emojiType, timestamp: new Date() });
                        transaction.update(docRef, { [`reactions.${emojiType}`]: increment(1) });
                        action = 'set';
                    }
                });
                
                // Sincronização final do LocalStorage (redundância para garantir consistência)
                if (action === 'remove') {
                    localStorage.removeItem(storageKey);
                } else {
                    localStorage.setItem(storageKey, emojiType);
                }
                const card = btn.closest('.feedback-card');
                if (card) {
                    const counts = Array.from(card.querySelectorAll('.count-span')).map((s) => parseInt(s.textContent || '0') || 0);
                    const total = counts.reduce((a, b) => a + b, 0);
                    const ts = parseInt(card.dataset.timestamp || '0') || 0;
                    card.dataset.orderKey = ts + total * REACTION_WEIGHT_MS;
                    const bar = card.querySelector('.bg-blue-500');
                    if (bar) bar.style.width = `${Math.min(100, total * 12)}%`;
                    const badgeArea = card.querySelector('.flex.items-center.justify-between.mb-4 > div:first-child');
                    const hasBadge = badgeArea && badgeArea.querySelector('.bg-emerald-500\\/10');
                    if (badgeArea && !hasBadge && total >= HYPE_THRESHOLD) {
                        const span = document.createElement('span');
                        span.className = 'inline-flex items-center gap-1 bg-emerald-500/10 text-emerald-600 border border-emerald-500/20 text-[9px] font-black uppercase tracking-widest px-2 py-0.5 rounded-md';
                        span.innerHTML = '<i data-lucide="trending-up" size="12"></i> Em alta';
                        badgeArea.appendChild(span);
                        lucide.createIcons();
                    }
                    container.removeChild(card);
                    insertSorted(container, card);
                }
            } catch (e) {
                console.error("Erro na reação:", e);
                // Rollback visual simples: recarregar a página ou reverter classes (opcional, mas recomendado em apps complexos)
                // Aqui, como o listener do Firestore vai disparar em breve se houver erro de rede, a UI vai se corrigir sozinha eventualmente.
                // Mas para feedback de erro imediato:
                window.showToast ? window.showToast("Erro ao salvar reação") : alert("Erro ao salvar reação");
            }
        };

        window.shareRelato = async (id) => {
            const base = `${location.origin}${location.pathname.replace(/[^/]+$/, '')}feed.html`;
            const url = `${base}?focus=${encodeURIComponent(id)}`;
            const title = 'Denúncia no Sentinela STP';
            const text = 'Veja esta denúncia no Sentinela STP e participe com sua reação.';
            try {
                if (navigator.share) {
                    await navigator.share({ title, text, url });
                } else {
                    await navigator.clipboard.writeText(url);
                    window.showToast ? window.showToast('Link copiado') : alert('Link copiado');
                }
            } catch {}
        };

        const buildQuery = (baseCollection, isHistory = false) => {
            let constraints = [];
            
            // Adicionar Filtros
            if (currentFilters.zona) constraints.push(where('zona', '==', currentFilters.zona));
            if (currentFilters.linha) constraints.push(where('linha', '==', currentFilters.linha));
            
            // Ordenação (Sempre por Timestamp Descendente)
            constraints.push(orderBy('timestamp', 'desc'));

            // Paginação ou Limite Inicial
            if (isHistory) {
                constraints.push(startAfter(lastVisible));
                constraints.push(limit(HISTORY_PAGE_EVIDENCIAS));
            } else {
                constraints.push(limit(10));
            }

            return query(baseCollection, ...constraints);
        };

        // --- SISTEMA DE PATRONOS NO FEED ---
        let unsubscribePatronsFeed = null;

        const startPatronsFeedIntegration = () => {

            );

        const startLiveFeed = () => {

            // Reiniciar sub-feeds
            startNewsFeedIntegration();

            // Resetar estado do feed principal
            container.innerHTML = `
                <div id="initial-loader" class="flex flex-col items-center justify-center py-20 text-slate-300">
                    <i data-lucide="loader-2" class="animate-spin mb-4" size="48"></i>
                    <p class="font-bold uppercase text-xs tracking-widest">Conectando ao banco de dados...</p>
                </div>
            `;
            
            // Iniciar também o feed de notícias para garantir sincronia
            startNewsFeedIntegration();
            
            lucide.createIcons();
            lastVisible = null;
            hasMore = true;
            lastVisibleNews = null;
            hasMoreNews = true;

            try {
                const qLive = buildQuery(collection(db, 'artifacts', 'sentinela-stp', 'public', 'data', 'evidencias'));
                let isFirstLoad = true;

                unsubscribeLiveFeed = onSnapshot(qLive, (snapshot) => {
                    const initialLoader = document.getElementById('initial-loader');
                    if (initialLoader) initialLoader.remove();
                    
                    if (snapshot.empty && isFirstLoad) {
                        // Se não tiver relatos, apenas removemos o loader. 
                        // As notícias podem aparecer, então não mostramos "Nenhum relato" imediatamente se houver notícias.
                        // Mas como notícias são assíncronas, talvez mostremos depois.
                        // Vamos deixar o container limpo (exceto notícias que já chegaram)
                        
                        // Verificar se já tem notícias
                        if (container.children.length === 0) {
                             container.innerHTML = `
                                <div class="text-center py-12 text-slate-400 empty-msg">
                                    <i data-lucide="inbox" class="mx-auto mb-2" size="32"></i>
                                    <p class="text-xs font-bold uppercase tracking-widest">Nenhum relato encontrado com este filtro.</p>
                                </div>
                            `;
                            lucide.createIcons();
                        }
                        isFirstLoad = false;
                        return;
                    }

                    if (isFirstLoad) {
                        // Carga Inicial
                        snapshot.forEach((doc) => {
                            const data = doc.data();
                            const card = createCard({ id: doc.id, ...data });
                            if (card) insertSorted(container, card);
                        });
                        isFirstLoad = false;
                    } else {
                        // Atualizações em Tempo Real
                        snapshot.docChanges().forEach((change) => {
                            if (change.type === "added") {
                                const data = change.doc.data();
                                const card = createCard({ id: change.doc.id, ...data }, true);
                                if (card) {
                                    insertSorted(container, card);
                                    // Remover mensagem de vazio
                                    const emptyMsg = container.querySelector('.empty-msg');
                                    if(emptyMsg) emptyMsg.remove();
                                }
                            }
                        });
                    }

                    if (!lastVisible && !snapshot.empty) {
                        lastVisible = snapshot.docs[snapshot.docs.length - 1];
                    }
                    lucide.createIcons();

                }, (error) => {
                    console.error("Erro Live Feed:", error);
                    container.innerHTML = `
                        <div class="text-center py-8 text-red-400">
                            <i data-lucide="alert-triangle" class="mx-auto mb-2" size="24"></i>
                            <p class="text-xs font-bold uppercase">Erro ao carregar feed. Verifique sua conexão ou filtros.</p>
                        </div>
                    `;
                    lucide.createIcons();
                });

            } catch (e) {
                console.error("Erro ao iniciar feed:", e);
            }
        };

        const updateScrollAnchorStatus = () => {
            if (!scrollAnchor) return;
            const canLoadEvid = !!lastVisible && hasMore;
            const canLoadNews = !!lastVisibleNews && hasMoreNews;
            if (!canLoadEvid && !canLoadNews) {
                scrollAnchor.innerHTML = `<p class="text-[10px] font-black text-slate-300 uppercase tracking-widest">Fim do histórico</p>`;
            } else {
                if (loadMoreLoader && !scrollAnchor.contains(loadMoreLoader)) {
                    scrollAnchor.innerHTML = '';
                    scrollAnchor.appendChild(loadMoreLoader);
                }
            }
        };

        const loadMoreArtigosHistory = async () => {
            if (!lastVisibleNews || !hasMoreNews) return 0;
            const qNextNews = query(
                collection(db, 'artifacts', 'sentinela-stp', 'public', 'data', 'artigos'),
                orderBy('timestamp', 'desc'),
                startAfter(lastVisibleNews),
                limit(HISTORY_PAGE_ARTIGOS)
            );
            const snapshot = await getDocs(qNextNews);
            if (snapshot.empty) {
                hasMoreNews = false;
                return 0;
            }
            lastVisibleNews = snapshot.docs[snapshot.docs.length - 1];
            snapshot.forEach((docSnap) => {
                const data = docSnap.data();
                const newsCard = createNewsFeedCard({ ...data, id: docSnap.id });
                insertSorted(container, newsCard);
            });
            return snapshot.size;
        };

        const loadHistory = async () => {
            if (isLoadingMore) return;
            const canLoadEvid = !!lastVisible && hasMore;
            const canLoadNews = !!lastVisibleNews && hasMoreNews;
            if (!canLoadEvid && !canLoadNews) {
                updateScrollAnchorStatus();
                return;
            }
            
            isLoadingMore = true;
            if (loadMoreLoader) loadMoreLoader.classList.remove('hidden');

            try {
                const tasks = [];
                if (canLoadEvid) {
                    tasks.push((async () => {
                        const qNext = buildQuery(collection(db, 'artifacts', 'sentinela-stp', 'public', 'data', 'evidencias'), true);
                        const snapshot = await getDocs(qNext);
                        if (snapshot.empty) {
                            hasMore = false;
                            return 0;
                        }
                        lastVisible = snapshot.docs[snapshot.docs.length - 1];
                        snapshot.forEach((docSnap) => {
                            const card = createCard({ id: docSnap.id, ...docSnap.data() });
                            if (card) insertSorted(container, card);
                        });
                        return snapshot.size;
                    })());
                }
                if (canLoadNews) {
                    tasks.push(loadMoreArtigosHistory());
                }
                const counts = await Promise.all(tasks);
                if (counts.some((c) => c > 0)) lucide.createIcons();
            } catch (e) {
                console.error("Erro Paginação:", e);
                hasMore = false;
                hasMoreNews = false;
            } finally {
                isLoadingMore = false;
                if (loadMoreLoader) loadMoreLoader.classList.add('hidden');
                updateScrollAnchorStatus();
            }
        };

        // Event Listeners para Filtros
        applyFiltersBtn.addEventListener('click', () => {
            currentFilters = {
                zona: filterZone.value,
                linha: filterLine.value.trim()
            };
            startLiveFeed();
        });

        // Trigger inicial
        const observer = new IntersectionObserver((entries) => {
            if (entries[0].isIntersecting) loadHistory();
        }, { threshold: 0, rootMargin: `${HISTORY_PREFETCH_PX}px 0px` });

        if (scrollAnchor) observer.observe(scrollAnchor);

        signInAnonymously(auth)
            .then(() => {
                loadEditorialCarousel();
                startLiveFeed();
                const params = new URLSearchParams(location.search);
                const focusId = params.get('focus');
                if (focusId) {
                    const tryFocus = () => {
                        const el = document.getElementById(`relato-${focusId}`);
                        if (!el) {
                            setTimeout(tryFocus, 500);
                            return;
                        }
                        el.classList.add('ring-2','ring-emerald-500','ring-offset-4');
                        el.scrollIntoView({ behavior: 'smooth', block: 'center' });
                        setTimeout(() => el.classList.remove('ring-emerald-500'), 2500);
                    };
                    tryFocus();
                }
            })
            .catch(err => console.error("Erro Auth:", err));

    </script>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            lucide.createIcons();
        });
    </script>
    <script src="version-display.js"></script>
</body>
</html>
