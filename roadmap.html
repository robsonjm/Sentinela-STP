<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roadmap Sentinela STP - Inteligência em Movimento</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Urbanist:wght@400;700;900&display=swap');
        
        :root {
            --accent-blue: #3b82f6;
            --bg-dark: #020617;
        }

        body { 
            font-family: 'Urbanist', sans-serif; 
            background-color: var(--bg-dark); 
            color: white;
            scroll-behavior: smooth;
        }

        /* D-Day Slider */
        .dday-slider-container {
            height: 80px;
            overflow: hidden;
            position: relative;
        }
        .dday-slide {
            transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .dday-item {
            height: 80px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .roadmap-line { 
            position: absolute; 
            left: 50%; 
            top: 0; 
            bottom: 0; 
            width: 2px; 
            background: linear-gradient(to bottom, transparent, #3b82f6, #8b5cf6, #334155); 
            transform: translateX(-50%); 
        }

        .milestone-card { 
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            border: 1px solid rgba(255,255,255,0.05); 
            backdrop-filter: blur(10px);
            position: relative;
        }

        .milestone-card:hover { 
            border-color: var(--accent-blue); 
            transform: translateY(-8px) scale(1.01);
            background: rgba(15, 23, 42, 0.8);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        .status-dot { 
            width: 20px; 
            height: 20px; 
            border-radius: 50%; 
            position: absolute; 
            left: 50%; 
            transform: translateX(-50%); 
            z-index: 10; 
            border: 4px solid var(--bg-dark); 
        }

        .completed { background-color: #22c55e; box-shadow: 0 0 20px rgba(34, 197, 94, 0.6); }
        .in-progress { background-color: #3b82f6; box-shadow: 0 0 20px rgba(59, 130, 246, 0.6); animation: pulse 2s infinite; }
        .future { background-color: #334155; }

        @keyframes pulse {
            0% { transform: translateX(-50%) scale(1); opacity: 1; }
            50% { transform: translateX(-50%) scale(1.4); opacity: 0.5; }
            100% { transform: translateX(-50%) scale(1); opacity: 1; }
        }

        .glass-panel {
            background: linear-gradient(135deg, rgba(255,255,255,0.05) 0%, rgba(255,255,255,0) 100%);
            border: 1px solid rgba(255,255,255,0.1);
        }

        .badge {
            font-size: 9px;
            font-weight: 900;
            text-transform: uppercase;
            padding: 4px 12px;
            border-radius: 9999px;
            border-width: 1px;
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }

        /* Editor Styles */
        .edit-input {
            background: rgba(255,255,255,0.05);
            border: 1px dashed rgba(59, 130, 246, 0.5);
            color: white;
            padding: 2px 4px;
            border-radius: 4px;
            width: 100%;
        }

        .admin-only { display: none; }
        body.edit-mode .admin-only { display: inline-flex; }
        body.edit-mode .editable { cursor: pointer; border: 1px dashed rgba(59, 130, 246, 0.3); padding: 2px; }

        .fab {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            z-index: 100;
        }

        /* Drag and Drop Styles */
        .milestone-row.dragging {
            opacity: 0.5;
            transform: scale(0.98);
        }

        .milestone-row.drag-over {
            border-top: 4px solid var(--accent-blue);
            padding-top: 1rem;
        }

        body.edit-mode .milestone-row {
            cursor: grab;
        }

        body.edit-mode .milestone-row:active {
            cursor: grabbing;
        }

        /* Add Milestone Between Zone */
        .add-milestone-zone {
            height: 24px;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: -8px 0;
            z-index: 20;
            opacity: 0;
            transition: opacity 0.2s;
        }

        .add-milestone-zone:hover {
            opacity: 1;
        }

        .add-milestone-btn {
            background: var(--accent-blue);
            color: white;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 10px rgba(59, 130, 246, 0.5);
            cursor: pointer;
            border: 2px solid var(--bg-dark);
            transition: transform 0.2s;
        }

        .add-milestone-btn:hover {
            transform: scale(1.2);
            background: #60a5fa;
        }

        /* Modal Styles */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(8px);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
        }
        .modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }
        .modal-content {
            background: #0f172a;
            border: 1px solid rgba(255, 255, 255, 0.1);
            width: 90%;
            max-width: 600px;
            max-height: 80vh;
            overflow-y: auto;
            border-radius: 2rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
    </style>
</head>
<body class="p-4 md:p-12 overflow-x-hidden opacity-0 transition-opacity duration-500">

    <div id="app" class="max-w-6xl mx-auto space-y-16">
        <!-- Renderizado via JS -->
    </div>

    <!-- Modal para Propostas Orçamentárias -->
    <div id="modal-overlay" class="modal-overlay" onclick="if(event.target === this) closeProposalsModal()">
        <div class="modal-content p-8 relative">
            <button onclick="closeProposalsModal()" class="absolute top-6 right-6 text-slate-500 hover:text-white transition-colors">
                <i data-lucide="x"></i>
            </button>
            <div id="modal-body">
                <!-- Conteúdo via renderProposalsModal -->
            </div>
        </div>
    </div>

    <div id="exec-modal-overlay" class="modal-overlay" onclick="if(event.target === this) closeExecutionModal()">
        <div class="modal-content p-8 relative">
            <button onclick="closeExecutionModal()" class="absolute top-6 right-6 text-slate-500 hover:text-white transition-colors">
                <i data-lucide="x"></i>
            </button>
            <div id="exec-modal-body"></div>
        </div>
    </div>

    <!-- Botão do Editor -->
    <div class="fab">
        <button onclick="toggleEditMode()" class="bg-blue-600 hover:bg-blue-500 text-white p-4 rounded-full shadow-2xl flex items-center gap-2 font-black uppercase text-xs tracking-widest transition-all scale-100 hover:scale-110">
            <i data-lucide="settings"></i> <span id="edit-btn-text">Modo Editor</span>
        </button>
    </div>

    <!-- Firebase Integration -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { firebaseConfig } from "./js/config.js?v=3";

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // Global instances for regular script
        window.auth = auth;
        window.db = db;
        window.firestore = { doc, getDoc, setDoc };

        // Auth Logic
        onAuthStateChanged(auth, async (user) => {
            if (user && !user.isAnonymous) {
                // Usuário autenticado
                document.body.classList.remove('opacity-0');
                await loadFirebaseData();
            } else {
                // Não autenticado ou anônimo -> Redirecionar para login centralizado
                if (user) signOut(auth);
                window.location.href = "login.html?redirect=roadmap.html";
            }
        });

        window.logout = () => {
            signOut(auth).then(() => {
                window.location.href = "login.html";
            });
        };

        // Firebase Data Sync
        window.loadFirebaseData = async () => {
            try {
                const docRef = window.firestore.doc(db, "artifacts", "sentinela-stp", "public", "roadmap");
                const docSnap = await window.firestore.getDoc(docRef);
                
                if (docSnap.exists()) {
                    const data = docSnap.data();
                    // Migração simples se necessário
                    if (data.budget && !data.budgetGroups) {
                        data.budgetGroups = [{ id: "legacy", name: "Orçamento Geral", items: data.budget }];
                        delete data.budget;
                    }
                    // Migração para propostas com unitValue e quantity
                    if (data.budgetGroups) {
                        data.budgetGroups.forEach(g => {
                            g.items.forEach(item => {
                                if (!item.execution || typeof item.execution !== 'object') {
                                    item.execution = { status: "PLANEJADO" };
                                }
                                const st = item.execution.status;
                                const allowed = st === "PLANEJADO" || st === "EM_EXECUCAO" || st === "CONCLUIDO" || st === "CANCELADO";
                                if (!allowed) item.execution.status = "PLANEJADO";
                                if (item.execution.selectedProposalIndex !== null && item.execution.selectedProposalIndex !== undefined) {
                                    item.execution.selectedProposalIndex = Number(item.execution.selectedProposalIndex);
                                    if (!Number.isFinite(item.execution.selectedProposalIndex)) item.execution.selectedProposalIndex = null;
                                }
                                if (item.execution.executedValue !== null && item.execution.executedValue !== undefined) {
                                    item.execution.executedValue = Number(item.execution.executedValue);
                                    if (!Number.isFinite(item.execution.executedValue)) item.execution.executedValue = null;
                                }
                                if (item.execution.executedAt !== null && item.execution.executedAt !== undefined) {
                                    item.execution.executedAt = String(item.execution.executedAt);
                                }
                                if (item.execution.vendor !== null && item.execution.vendor !== undefined) {
                                    item.execution.vendor = String(item.execution.vendor);
                                }
                                if (item.execution.notes !== null && item.execution.notes !== undefined) {
                                    item.execution.notes = String(item.execution.notes);
                                }
                                if (item.execution.asset !== null && item.execution.asset !== undefined && typeof item.execution.asset !== 'object') {
                                    item.execution.asset = null;
                                }
                                if (item.proposals) {
                                    item.proposals.forEach(p => {
                                        p.unitValue = Number(p.unitValue ?? p.value) || 0;
                                        p.quantity = Number(p.quantity) || 1;
                                        p.value = Number(p.value) || (p.unitValue * p.quantity);
                                    });
                                }
                            });
                        });
                    }
                    window.appData = data;
                } else {
                    window.appData = window.defaultData;
                    await window.saveDataToFirebase();
                }
                window.render();
            } catch (error) {
                console.error("Erro ao carregar dados:", error);
                // Se der erro de permissão, usar defaultData para não quebrar a página
                window.appData = window.defaultData;
                window.render();
            }
        };

        window.saveDataToFirebase = async () => {
            try {
                const docRef = window.firestore.doc(db, "artifacts", "sentinela-stp", "public", "roadmap");
                await window.firestore.setDoc(docRef, window.appData);
                console.log("Dados salvos no Firebase!");
            } catch (error) {
                console.error("Erro ao salvar dados:", error);
                alert("Erro ao salvar no servidor. Verifique as permissões do Firebase.");
            }
        };
    </script>

    <script>
        function escapeHtml(value) {
            const s = value == null ? '' : String(value);
            return s.replace(/[&<>"']/g, (c) => {
                if (c === '&') return '&amp;';
                if (c === '<') return '&lt;';
                if (c === '>') return '&gt;';
                if (c === '"') return '&quot;';
                return '&#39;';
            });
        }

        function sanitizeHref(value) {
            const s = value == null ? '' : String(value).trim();
            if (!s) return '#';
            if (s.startsWith('#')) return s;
            if (s.startsWith('/') || s.startsWith('./') || s.startsWith('../')) return s;
            try {
                const u = new URL(s, window.location.origin);
                if (u.protocol !== 'http:' && u.protocol !== 'https:') return '#';
                return u.toString();
            } catch {
                return '#';
            }
        }

            ],
            budgetGroups: [
                {

                    items: [
                        { label: "Investimento Infra (QG)", value: 45000 },

                    ]
                },
                {

                    name: "Operação Contínua",
                    items: [
                        { label: "Jornalismo & Investigação (6 meses)", value: 25000 }
                    ]
                }
            ],
            milestones: [
                { 
                    id: 1, date: "Jan - Fev 2026", targetDate: "2026-02-28", title: "A Fagulha Técnica", 
                    desc: "Desenvolvimento do App Beta e Dashboard de Transparência.", tags: ["Core 1.0", "Backend"], 
                    status: "completed", icon: "check-circle", budgetGroupId: "fase1",
                    tasks: [
                        { title: "Arquitetura Backend", completed: true },
                        { title: "App Fiscalização V1", completed: true },
                        { title: "Dashboard Real-time", completed: false }
                    ]
                },
                { 
                    id: 2, date: "11 de Março 2026", targetDate: "2026-03-11", title: "Dossiê e Alianças", 
                    desc: "Consolidação do histórico do Lobby e entrada de Rafael Marinho.", tags: ["Dossiê OK", "Equipe OK"], 
                    status: "in-progress", icon: "brain", budgetGroupId: "fase1",
                    tasks: [
                        { title: "Levantamento Histórico", completed: true },
                        { title: "Mapeamento Interesses", completed: true },
                        { title: "Formalização Equipe", completed: true }
                    ]
                },
                { 
                    id: 3, date: "17 de Março 2026", targetDate: "2026-03-17", title: "Mesa Parlamentar", 
                    desc: "Apresentação do pleito de R$ 185k e protocolo da Minuta de Lei.", tags: ["Apresentação"], 
                    status: "future", icon: "landmark", budgetGroupId: "fase1",
                    tasks: [
                        { title: "Protocolo Minuta", completed: false },
                        { title: "Reunião Orçamentária", completed: false }
                    ]
                },
                { 
                    id: 4, date: "Abril - Maio 2026", targetDate: "2026-05-31", title: "Formalização e Expansão", 
                    desc: "Execução do Plano de Expansão V1 e aquisição das Workstations TI.", tags: ["Protocolo CNP", "Plano Expansão"], 
                    status: "future", icon: "shield", budgetGroupId: "operacao",
                    tasks: [
                        { title: "Aquisição Hardware", completed: false },
                        { title: "Plano de Comunicação", completed: false }
                    ]
                },
                { 
                    id: 5, date: "Agosto 2026", targetDate: "2026-08-31", title: "Soberania IoT", 
                    desc: "Implantação de 50 unidades 'Caixa Preta'.", tags: ["Sentinela News"], 
                    status: "future", icon: "rocket", budgetGroupId: "operacao",
                    tasks: [
                        { title: "Instalação IoT", completed: false },
                        { title: "Lançamento Sentinela News", completed: false }
                    ]
                }
            ]
        };

        window.appData = window.defaultData; // Inicia com default até carregar do Firebase
        let isEditMode = false;
        let currentDDaySlide = 0;
        let ddayInterval = null;
        let currentProposalItem = null; // { gIdx, iIdx }

        function saveData() {
            if (window.saveDataToFirebase) {
                window.saveDataToFirebase();
            } else {
                localStorage.setItem('sentinela_data', JSON.stringify(appData));
            }
            render();
        }

        function toggleEditMode() {
            isEditMode = !isEditMode;
            document.body.classList.toggle('edit-mode', isEditMode);
            document.getElementById('edit-btn-text').innerText = isEditMode ? "Salvar Alterações" : "Modo Editor";
            if (!isEditMode) saveData();
            render();
        }

        // Funções de Edição
        function updateProgress(val) { appData.progress = val; render(); }
        
        function addBudgetGroup() {
            const id = "group_" + Date.now();
            appData.budgetGroups.push({ id: id, name: "Novo Grupo", items: [] });
            render();
        }

        function removeBudgetGroup(index) {
            appData.budgetGroups.splice(index, 1);
            render();
        }

        function addBudgetItem(groupIndex) {
            appData.budgetGroups[groupIndex].items.push({ label: "Novo Item", value: 0, execution: { status: "PLANEJADO", selectedProposalIndex: null, executedValue: null, executedAt: "", vendor: "", notes: "", asset: null } });
            render();
        }

        function removeBudgetItem(groupIndex, itemIndex) {
            appData.budgetGroups[groupIndex].items.splice(itemIndex, 1);
            render();
        }

        function openProposalsModal(gIdx, iIdx) {
            currentProposalItem = { gIdx, iIdx };
            const item = appData.budgetGroups[gIdx].items[iIdx];
            if (!item.proposals) item.proposals = [];
            document.getElementById('modal-overlay').classList.add('active');
            renderProposalsModal();
        }

        function closeProposalsModal() {
            document.getElementById('modal-overlay').classList.remove('active');
            currentProposalItem = null;
        }

        function addProposal() {
            if (!currentProposalItem) return;
            const { gIdx, iIdx } = currentProposalItem;
            appData.budgetGroups[gIdx].items[iIdx].proposals.push({
                company: "Nova Empresa",
                unitValue: 0,
                quantity: 1,
                value: 0,
                note: ""
            });
            renderProposalsModal();
        }

        function removeProposal(pIdx) {
            if (!currentProposalItem) return;
            const { gIdx, iIdx } = currentProposalItem;
            appData.budgetGroups[gIdx].items[iIdx].proposals.splice(pIdx, 1);
            renderProposalsModal();
        }

        function updateProposal(pIdx, field, val) {
            if (!currentProposalItem) return;
            const { gIdx, iIdx } = currentProposalItem;
            const proposal = appData.budgetGroups[gIdx].items[iIdx].proposals[pIdx];
            proposal[field] = val;
            
            // Recalcular o total da proposta
            const uv = proposal.unitValue || 0;
            const q = proposal.quantity || 1;
            proposal.value = uv * q;
            
            renderProposalsModal();
        }

        function useProposalValue(pIdx) {
            if (!currentProposalItem) return;
            const { gIdx, iIdx } = currentProposalItem;
            const proposal = appData.budgetGroups[gIdx].items[iIdx].proposals[pIdx];
            
            // Garantir que o valor total está atualizado
            const uv = proposal.unitValue || 0;
            const q = proposal.quantity || 1;
            proposal.value = uv * q;
            
            appData.budgetGroups[gIdx].items[iIdx].value = proposal.value;
            render();
            renderProposalsModal();
        }

        let currentExecItem = null;

        function sanitizeExecStatus(value) {
            const s = value == null ? '' : String(value);
            if (s === 'PLANEJADO' || s === 'EM_EXECUCAO' || s === 'CONCLUIDO' || s === 'CANCELADO') return s;
            return 'PLANEJADO';
        }

        function execStatusLabel(status) {
            if (status === 'EM_EXECUCAO') return 'Em execução';
            if (status === 'CONCLUIDO') return 'Concluído';
            if (status === 'CANCELADO') return 'Cancelado';
            return 'Planejado';
        }

        function execStatusBadge(status) {
            const st = sanitizeExecStatus(status);
            const label = execStatusLabel(st);
            if (st === 'CONCLUIDO') return `<span class="text-[8px] font-black px-2 py-1 rounded-full bg-green-500/10 text-green-400 border border-green-500/20 uppercase tracking-widest">${label}</span>`;
            if (st === 'EM_EXECUCAO') return `<span class="text-[8px] font-black px-2 py-1 rounded-full bg-blue-500/10 text-blue-400 border border-blue-500/20 uppercase tracking-widest">${label}</span>`;
            if (st === 'CANCELADO') return `<span class="text-[8px] font-black px-2 py-1 rounded-full bg-red-500/10 text-red-400 border border-red-500/20 uppercase tracking-widest">${label}</span>`;
            return `<span class="text-[8px] font-black px-2 py-1 rounded-full bg-slate-800 text-slate-400 border border-slate-700 uppercase tracking-widest">${label}</span>`;
        }

        function ensureExecutionObject(item) {
            if (!item.execution || typeof item.execution !== 'object') {
                item.execution = { status: 'PLANEJADO', selectedProposalIndex: null, executedValue: null, executedAt: '', vendor: '', notes: '', asset: null };
            }
            if (item.execution.selectedProposalIndex !== null && item.execution.selectedProposalIndex !== undefined) {
                item.execution.selectedProposalIndex = Number(item.execution.selectedProposalIndex);
                if (!Number.isFinite(item.execution.selectedProposalIndex)) item.execution.selectedProposalIndex = null;
            }
            item.execution.status = sanitizeExecStatus(item.execution.status);
            return item.execution;
        }

        function openExecutionModal(gIdx, iIdx) {
            currentExecItem = { gIdx, iIdx };
            const item = appData.budgetGroups[gIdx].items[iIdx];
            ensureExecutionObject(item);
            document.getElementById('exec-modal-overlay').classList.add('active');
            renderExecutionModal();
        }

        function closeExecutionModal() {
            document.getElementById('exec-modal-overlay').classList.remove('active');
            currentExecItem = null;
        }

        function onExecProposalChange(val) {
            if (!currentExecItem) return;
            const { gIdx, iIdx } = currentExecItem;
            const item = appData.budgetGroups[gIdx].items[iIdx];
            const exec = ensureExecutionObject(item);
            if (val === 'manual') {
                exec.selectedProposalIndex = null;
                renderExecutionModal();
                return;
            }
            const idx = Number(val);
            if (!Number.isFinite(idx)) return;
            exec.selectedProposalIndex = idx;
            const p = (item.proposals || [])[idx];
            if (p) {
                exec.executedValue = Number(p.value) || exec.executedValue;
                exec.vendor = String(p.company || exec.vendor || '');
            }
            renderExecutionModal();
        }

        function onExecAssetToggle(checked) {
            if (!currentExecItem) return;
            const { gIdx, iIdx } = currentExecItem;
            const item = appData.budgetGroups[gIdx].items[iIdx];
            const exec = ensureExecutionObject(item);
            if (checked) {
                if (!exec.asset) exec.asset = { type: 'PERMANENTE', qty: 1, location: '', custodian: '', evidenceLink: '' };
            } else {
                exec.asset = null;
            }
            renderExecutionModal();
        }

        function saveExecution() {
            if (!currentExecItem) return;
            const { gIdx, iIdx } = currentExecItem;
            const item = appData.budgetGroups[gIdx].items[iIdx];
            const exec = ensureExecutionObject(item);

            exec.status = sanitizeExecStatus(document.getElementById('exec-status').value);
            const selected = document.getElementById('exec-proposal').value;
            exec.selectedProposalIndex = selected === 'manual' ? null : Number(selected);
            if (!Number.isFinite(exec.selectedProposalIndex)) exec.selectedProposalIndex = null;
            const val = Number(document.getElementById('exec-value').value);
            exec.executedValue = Number.isFinite(val) ? val : null;
            exec.executedAt = String(document.getElementById('exec-date').value || '');
            exec.vendor = String(document.getElementById('exec-vendor').value || '');

            event.dataTransfer.effectAllowed = 'move';
        }

        function onDragOver(index) {
            if (!isEditMode) return;
            event.preventDefault();
            const row = event.target.closest('.milestone-row');
            if (row && index !== draggedItemIndex) {
                row.classList.add('drag-over');
            }
        }

        function onDragLeave(index) {
            const row = event.target.closest('.milestone-row');
            if (row) {
                row.classList.remove('drag-over');
            }
        }

        function onDrop(targetIndex) {
            if (!isEditMode) return;
            event.preventDefault();
            const row = event.target.closest('.milestone-row');
            if (row) row.classList.remove('drag-over');

            if (draggedItemIndex === null || draggedItemIndex === targetIndex) return;

            const milestones = [...appData.milestones];
            const itemToMove = milestones.splice(draggedItemIndex, 1)[0];

                    if (executedValue != null) executedTotal += executedValue;

                                            <div class="flex items-center gap-2 ml-6">
                                                <div class="flex items-center gap-1 bg-purple-500/5 px-2 py-0.5 rounded border border-purple-500/10">
                                                    <i data-lucide="banknote" size="8" class="text-purple-400"></i>
                                                    <span class="text-[8px] font-bold text-purple-400/80 uppercase">${safeBudgetLabel}</span>
                                                </div>
                                            </div>
                                        ` : '')}
                                    </div>
                                `;
                            }).join('')}
                        </div>
                    </div>

                    <div class="flex flex-wrap ${i % 2 === 0 ? 'justify-end' : 'justify-start'} gap-2 pt-2">
                        ${safeTags.map(tag => `<span class="badge bg-slate-800 text-slate-400 border-slate-700">${tag}</span>`).join('')}
                        ${isEditMode ? `<button class="text-[9px] text-blue-500 underline" onclick="const t=prompt('Nova Tag'); if(t) {appData.milestones[${i}].tags.push(t); render();}">+ tag</button>` : ''}
                    </div>

                    ${isEditMode ? `
                        <div class="pt-4 border-t border-slate-800 flex flex-col gap-4">
                            <div class="flex gap-2 justify-center">
                                <button onclick="appData.milestones[${i}].status='completed'; render()" class="text-[8px] bg-green-500/20 text-green-500 p-1 rounded">Feito</button>
                                <button onclick="appData.milestones[${i}].status='in-progress'; render()" class="text-[8px] bg-blue-500/20 text-blue-500 p-1 rounded">Atual</button>
                                <button onclick="appData.milestones[${i}].status='future'; render()" class="text-[8px] bg-slate-800 text-slate-500 p-1 rounded">Futuro</button>
                            </div>
                            <div class="flex flex-col gap-1">
                                <label class="text-[8px] font-black text-slate-500 uppercase text-center">Vincular Orçamento</label>
                                <select class="bg-slate-900 text-[10px] text-slate-400 border border-slate-700 rounded p-1" onchange="appData.milestones[${i}].budgetGroupId=this.value; render()">
                                    <option value="">Sem vínculo</option>
                                    ${appData.budgetGroups.map(g => {
                                        const safeId = escapeHtml(g.id);
                                        const safeName = escapeHtml(g.name);
                                        return `<option value="${safeId}" ${ms.budgetGroupId === g.id ? 'selected' : ''}>${safeName}</option>`;
                                    }).join('')}
                                </select>
                            </div>
                        </div>
                    ` : ''}
                </div>
            `;
        }

        function renderMilestoneIcon(ms, i) {
            const icons = [
                'check-circle', 'brain', 'landmark', 'shield', 'rocket', 'flag', 
                'activity', 'zap', 'target', 'users', 'star', 'alert-circle', 
                'clock', 'calendar', 'file-text', 'map', 'camera', 'bus', 'settings'
            ];
            const icon = icons.includes(ms.icon) ? ms.icon : 'circle';
            
            return `
                <div class="flex flex-col items-center gap-3">
                    <div class="p-4 ${ms.status === 'completed' ? 'bg-green-600/10 text-green-500 border-green-600/20' : ms.status === 'in-progress' ? 'bg-blue-600/10 text-blue-500 border-blue-600/20' : 'bg-slate-800 text-slate-500 border-slate-700'} rounded-full border">
                        <i data-lucide="${icon}" size="32"></i>
                    </div>
                    ${isEditMode ? `
                        <select class="bg-slate-900 text-[10px] border border-slate-700 rounded px-1 py-0.5 text-slate-400 outline-none focus:border-blue-500" 
                                onchange="appData.milestones[${i}].icon=this.value; render()">
                            ${icons.map(icon => `<option value="${icon}" ${ms.icon === icon ? 'selected' : ''}>${icon}</option>`).join('')}
                        </select>
                    ` : ''}
                </div>
            `;
        }

        // Init
        render();
    </script>

    <!-- Nav Bar Principal -->

                <i data-lucide="home" size="20"></i>
                <span class="text-[9px] font-black uppercase">Início</span>
            </a>
            <a href="feed.html" class="nav-link flex flex-col items-center gap-1 text-slate-300 hover:text-slate-500 transition-colors p-2">
                <i data-lucide="newspaper" size="20"></i>
                <span class="text-[9px] font-black uppercase">Notícias</span>
            </a>
            <a href="painel.html" class="nav-link flex flex-col items-center gap-1 text-slate-300 hover:text-slate-500 transition-colors p-2">
                <i data-lucide="bar-chart" size="20"></i>
                <span class="text-[9px] font-black uppercase">Painel</span>
            </a>
            <a href="patronos.html" class="nav-link flex flex-col items-center gap-1 text-slate-300 hover:text-slate-500 transition-colors p-2">
                <i data-lucide="users" size="20"></i>
                <span class="text-[9px] font-black uppercase">Patronos</span>
            </a>
            <a href="landpage.html" class="nav-link flex flex-col items-center gap-1 text-slate-300 hover:text-slate-500 transition-colors p-2">

        </div>
    </nav>
