<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roadmap Sentinela STP - Inteligência em Movimento</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Urbanist:wght@400;700;900&display=swap');
        
        :root {
            --accent-blue: #3b82f6;
            --bg-dark: #020617;
        }

        body { 
            font-family: 'Urbanist', sans-serif; 
            background-color: var(--bg-dark); 
            color: white;
            scroll-behavior: smooth;
        }

        /* D-Day Slider */
        .dday-slider-container {
            height: 80px;
            overflow: hidden;
            position: relative;
        }
        .dday-slide {
            transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .dday-item {
            height: 80px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .roadmap-line { 
            position: absolute; 
            left: 50%; 
            top: 0; 
            bottom: 0; 
            width: 2px; 
            background: linear-gradient(to bottom, transparent, #3b82f6, #8b5cf6, #334155); 
            transform: translateX(-50%); 
        }

        .milestone-card { 
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            border: 1px solid rgba(255,255,255,0.05); 
            backdrop-filter: blur(10px);
            position: relative;
        }

        .milestone-card:hover { 
            border-color: var(--accent-blue); 
            transform: translateY(-8px) scale(1.01);
            background: rgba(15, 23, 42, 0.8);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        .status-dot { 
            width: 20px; 
            height: 20px; 
            border-radius: 50%; 
            position: absolute; 
            left: 50%; 
            transform: translateX(-50%); 
            z-index: 10; 
            border: 4px solid var(--bg-dark); 
        }

        .completed { background-color: #22c55e; box-shadow: 0 0 20px rgba(34, 197, 94, 0.6); }
        .in-progress { background-color: #3b82f6; box-shadow: 0 0 20px rgba(59, 130, 246, 0.6); animation: pulse 2s infinite; }
        .future { background-color: #334155; }

        @keyframes pulse {
            0% { transform: translateX(-50%) scale(1); opacity: 1; }
            50% { transform: translateX(-50%) scale(1.4); opacity: 0.5; }
            100% { transform: translateX(-50%) scale(1); opacity: 1; }
        }

        .glass-panel {
            background: linear-gradient(135deg, rgba(255,255,255,0.05) 0%, rgba(255,255,255,0) 100%);
            border: 1px solid rgba(255,255,255,0.1);
        }

        .badge {
            font-size: 9px;
            font-weight: 900;
            text-transform: uppercase;
            padding: 4px 12px;
            border-radius: 9999px;
            border-width: 1px;
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }

        /* Editor Styles */
        .edit-input {
            background: rgba(255,255,255,0.05);
            border: 1px dashed rgba(59, 130, 246, 0.5);
            color: white;
            padding: 2px 4px;
            border-radius: 4px;
            width: 100%;
        }

        .admin-only { display: none; }
        body.edit-mode .admin-only { display: inline-flex; }
        body.edit-mode .editable { cursor: pointer; border: 1px dashed rgba(59, 130, 246, 0.3); padding: 2px; }

        .fab {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            z-index: 100;
        }

        /* Drag and Drop Styles */
        .milestone-row.dragging {
            opacity: 0.5;
            transform: scale(0.98);
        }

        .milestone-row.drag-over {
            border-top: 4px solid var(--accent-blue);
            padding-top: 1rem;
        }

        body.edit-mode .milestone-row {
            cursor: grab;
        }

        body.edit-mode .milestone-row:active {
            cursor: grabbing;
        }

        /* Add Milestone Between Zone */
        .add-milestone-zone {
            height: 24px;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: -8px 0;
            z-index: 20;
            opacity: 0;
            transition: opacity 0.2s;
        }

        .add-milestone-zone:hover {
            opacity: 1;
        }

        .add-milestone-btn {
            background: var(--accent-blue);
            color: white;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 10px rgba(59, 130, 246, 0.5);
            cursor: pointer;
            border: 2px solid var(--bg-dark);
            transition: transform 0.2s;
        }

        .add-milestone-btn:hover {
            transform: scale(1.2);
            background: #60a5fa;
        }
    </style>
</head>
<body class="p-4 md:p-12 overflow-x-hidden opacity-0 transition-opacity duration-500">

    <div id="app" class="max-w-6xl mx-auto space-y-16">
        <!-- Renderizado via JS -->
    </div>

    <!-- Botão do Editor -->
    <div class="fab">
        <button onclick="toggleEditMode()" class="bg-blue-600 hover:bg-blue-500 text-white p-4 rounded-full shadow-2xl flex items-center gap-2 font-black uppercase text-xs tracking-widest transition-all scale-100 hover:scale-110">
            <i data-lucide="settings"></i> <span id="edit-btn-text">Modo Editor</span>
        </button>
    </div>

    <!-- Firebase Integration -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { firebaseConfig } from "./js/config.js?v=3";

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // Global instances for regular script
        window.auth = auth;
        window.db = db;
        window.firestore = { doc, getDoc, setDoc };

        // Auth Logic
        onAuthStateChanged(auth, async (user) => {
            if (user && !user.isAnonymous) {
                // Usuário autenticado
                document.body.classList.remove('opacity-0');
                await loadFirebaseData();
            } else {
                // Não autenticado ou anônimo -> Redirecionar para login centralizado
                if (user) signOut(auth);
                window.location.href = "login.html?redirect=roadmap.html";
            }
        });

        window.logout = () => {
            signOut(auth).then(() => {
                window.location.href = "login.html";
            });
        };

        // Firebase Data Sync
        window.loadFirebaseData = async () => {
            try {
                const docRef = window.firestore.doc(db, "artifacts", "sentinela-stp", "public", "roadmap");
                const docSnap = await window.firestore.getDoc(docRef);
                
                if (docSnap.exists()) {
                    const data = docSnap.data();
                    // Migração simples se necessário
                    if (data.budget && !data.budgetGroups) {
                        data.budgetGroups = [{ id: "legacy", name: "Orçamento Geral", items: data.budget }];
                        delete data.budget;
                    }
                    window.appData = data;
                } else {
                    window.appData = window.defaultData;
                    await window.saveDataToFirebase();
                }
                window.render();
            } catch (error) {
                console.error("Erro ao carregar dados:", error);
                // Se der erro de permissão, usar defaultData para não quebrar a página
                window.appData = window.defaultData;
                window.render();
            }
        };

        window.saveDataToFirebase = async () => {
            try {
                const docRef = window.firestore.doc(db, "artifacts", "sentinela-stp", "public", "roadmap");
                await window.firestore.setDoc(docRef, window.appData);
                console.log("Dados salvos no Firebase!");
            } catch (error) {
                console.error("Erro ao salvar dados:", error);
                alert("Erro ao salvar no servidor. Verifique as permissões do Firebase.");
            }
        };
    </script>

    <script>

                    desc: "Apresentação do pleito de R$ 185k e protocolo da Minuta de Lei.", tags: ["Apresentação"], 
                    status: "future", icon: "landmark", budgetGroupId: "fase1",
                    tasks: [

                        { title: "Reunião Orçamentária", completed: false }
                    ]
                },
                { 
                    id: 4, date: "Abril - Maio 2026", targetDate: "2026-05-31", title: "Formalização e Expansão", 
                    desc: "Execução do Plano de Expansão V1 e aquisição das Workstations TI.", tags: ["Protocolo CNP", "Plano Expansão"], 
                    status: "future", icon: "shield", budgetGroupId: "operacao",
                    tasks: [
                        { title: "Aquisição Hardware", completed: false },
                        { title: "Plano de Comunicação", completed: false }
                    ]
                },
                { 
                    id: 5, date: "Agosto 2026", targetDate: "2026-08-31", title: "Soberania IoT", 
                    desc: "Implantação de 50 unidades 'Caixa Preta'.", tags: ["Sentinela News"], 
                    status: "future", icon: "rocket", budgetGroupId: "operacao",
                    tasks: [
                        { title: "Instalação IoT", completed: false },
                        { title: "Lançamento Sentinela News", completed: false }
                    ]
                }
            ]
        };

        window.appData = window.defaultData; // Inicia com default até carregar do Firebase
        let isEditMode = false;
        let currentDDaySlide = 0;
        let ddayInterval = null;

        function saveData() {
            if (window.saveDataToFirebase) {
                window.saveDataToFirebase();
            } else {
                localStorage.setItem('sentinela_data', JSON.stringify(appData));
            }
            render();
        }

        function toggleEditMode() {
            isEditMode = !isEditMode;
            document.body.classList.toggle('edit-mode', isEditMode);
            document.getElementById('edit-btn-text').innerText = isEditMode ? "Salvar Alterações" : "Modo Editor";
            if (!isEditMode) saveData();
            render();
        }

        // Funções de Edição
        function updateProgress(val) { appData.progress = val; render(); }
        
        function addDocument() {
            appData.documents.push({ name: "Novo Documento", status: "Pendente", type: "warning" });
            render();
        }

        function removeDocument(index) {
            appData.documents.splice(index, 1);
            render();
        }

        function addBudgetGroup() {
            const id = "group_" + Date.now();
            appData.budgetGroups.push({ id: id, name: "Novo Grupo", items: [] });
            render();
        }

        function removeBudgetGroup(index) {
            appData.budgetGroups.splice(index, 1);
            render();
        }

        function addBudgetItem(groupIndex) {
            appData.budgetGroups[groupIndex].items.push({ label: "Novo Item", value: 0 });
            render();
        }

        function removeBudgetItem(groupIndex, itemIndex) {
            appData.budgetGroups[groupIndex].items.splice(itemIndex, 1);
            render();
        }

        function addTask(msIndex) {
            if (!appData.milestones[msIndex].tasks) appData.milestones[msIndex].tasks = [];
            appData.milestones[msIndex].tasks.push({ title: "Nova Tarefa", completed: false });
            render();
        }

        function removeTask(msIndex, taskIndex) {
            appData.milestones[msIndex].tasks.splice(taskIndex, 1);
            render();
        }

        function toggleTask(msIndex, taskIndex) {
            appData.milestones[msIndex].tasks[taskIndex].completed = !appData.milestones[msIndex].tasks[taskIndex].completed;
            render();
        }

        function addMilestone() {
            addMilestoneAt(appData.milestones.length);
        }

        function addMilestoneAt(index) {
            const newId = Date.now();
            const todayStr = new Date().toISOString().split('T')[0];
            const newMilestone = {
                id: newId,
                date: "Nova Data",
                targetDate: todayStr,
                title: "Novo Marco",
                desc: "Descrição aqui...",
                tags: ["Tag"],
                status: "future",
                icon: "plus",
                tasks: [],
                budgetGroupId: ""
            };
            appData.milestones.splice(index, 0, newMilestone);
            render();
        }

        function removeMilestone(index) {
            appData.milestones.splice(index, 1);
            render();
        }

        function updateMilestone(index, field, value) {
            appData.milestones[index][field] = value;
            // No render here to avoid losing focus during typing if we used inputs
        }

        // Funções de Drag and Drop
        let draggedItemIndex = null;

        function onDragStart(index) {
            if (!isEditMode) return;
            draggedItemIndex = index;
            event.target.closest('.milestone-row').classList.add('dragging');
            event.dataTransfer.effectAllowed = 'move';
        }

        function onDragOver(index) {
            if (!isEditMode) return;
            event.preventDefault();
            const row = event.target.closest('.milestone-row');
            if (row && index !== draggedItemIndex) {
                row.classList.add('drag-over');
            }
        }

        function onDragLeave(index) {
            const row = event.target.closest('.milestone-row');
            if (row) {
                row.classList.remove('drag-over');
            }
        }

        function onDrop(targetIndex) {
            if (!isEditMode) return;
            event.preventDefault();
            const row = event.target.closest('.milestone-row');
            if (row) row.classList.remove('drag-over');

            if (draggedItemIndex === null || draggedItemIndex === targetIndex) return;

            const milestones = [...appData.milestones];
            const itemToMove = milestones.splice(draggedItemIndex, 1)[0];
            milestones.splice(targetIndex, 0, itemToMove);
            
            appData.milestones = milestones;
            draggedItemIndex = null;
            render();
            // saveData() will be called when exiting edit mode
        }

        // RENDERIZAÇÃO
        function render() {
            const container = document.getElementById('app');
            
            // Cálculo do Orçamento Total
            let totalBudget = 0;
            appData.budgetGroups.forEach(g => {
                g.items.forEach(i => totalBudget += i.value);
            });
            
            // Cálculo Countdown Dinâmico (D-Days Futuros)
            const today = new Date();
            today.setHours(0, 0, 0, 0);

            const futureMilestones = appData.milestones
                .filter(ms => ms.targetDate && new Date(ms.targetDate + "T00:00:00") >= today)
                .sort((a, b) => new Date(a.targetDate) - new Date(b.targetDate));

            // Slider Logic
            let ddayHTML = '';
            if (futureMilestones.length > 0) {
                ddayHTML = `
                    <div class="dday-slider-container w-full">
                        <div id="dday-slide" class="dday-slide" style="transform: translateY(-${currentDDaySlide * 80}px)">
                            ${futureMilestones.map((ms, idx) => {
                                const target = new Date(ms.targetDate + "T00:00:00");
                                const diffDays = Math.ceil((target - today) / (1000 * 60 * 60 * 24));
                                
                                // idx 0 (Closest): Blue background, white text
                                // idx > 0 (Future): Dark background (parent), white text
                                const itemBg = idx === 0 ? 'bg-blue-600 shadow-inner' : 'bg-slate-900/60';
                                const labelColor = idx === 0 ? 'text-blue-100/70' : 'text-slate-500';

                                return `
                                    <div class="dday-item w-full ${itemBg}">
                                        <p class="text-[10px] font-black ${labelColor} uppercase mb-1 italic">D-Day (${ms.date})</p>
                                        <p class="text-2xl font-black text-white italic">${diffDays > 0 ? diffDays + ' DIAS' : (diffDays === 0 ? 'É HOJE' : 'CONCLUÍDO')}</p>
                                        <p class="text-[9px] font-bold ${labelColor} uppercase mt-1 italic">${ms.title}</p>
                                    </div>
                                `;
                            }).join('')}
                        </div>
                    </div>
                `;
            } else {
                ddayHTML = `
                    <div class="dday-item w-full bg-blue-600">
                        <p class="text-[10px] font-black text-white/70 uppercase mb-1 italic">D-Day</p>
                        <p class="text-2xl font-black text-white italic">CONCLUÍDO</p>
                        <p class="text-[9px] font-bold text-white/50 uppercase mt-1 italic">Todos os Alvos</p>
                    </div>
                `;
            }

            // Restart Interval if not already running or milestones changed
            if (futureMilestones.length > 1) {
                if (ddayInterval) clearInterval(ddayInterval);
                ddayInterval = setInterval(() => {
                    currentDDaySlide = (currentDDaySlide + 1) % futureMilestones.length;
                    const slider = document.getElementById('dday-slide');
                    if (slider) {
                        slider.style.transform = `translateY(-${currentDDaySlide * 80}px)`;
                    }
                }, 4000);
            }

            container.innerHTML = `
                <!-- Admin Top Bar (Simulada para Roadmap) -->
                <div class="flex justify-between items-center mb-6 bg-slate-900/60 p-4 rounded-2xl border border-slate-800">
                    <div class="flex items-center gap-3">
                        <div class="bg-blue-600/20 p-2 rounded-xl text-blue-400">
                            <i data-lucide="shield-check" size="20"></i>
                        </div>
                        <span class="text-[10px] font-mono text-slate-400">${window.auth.currentUser ? window.auth.currentUser.email : ''}</span>
                    </div>
                    <button onclick="logout()" class="bg-red-500/10 hover:bg-red-500/20 text-red-400 px-4 py-2 rounded-xl text-[10px] font-black uppercase tracking-widest transition-all">
                        Encerrar Sessão
                    </button>
                </div>

                <!-- Header -->
                <header class="relative flex flex-col md:flex-row justify-between items-center gap-8 bg-slate-900/40 p-8 md:p-12 rounded-[3rem] border border-slate-800 shadow-2xl overflow-hidden">
                    <div class="text-left space-y-4">
                        <div class="inline-flex items-center gap-2 bg-blue-600/20 text-blue-400 px-4 py-1.5 rounded-full text-[10px] font-black uppercase tracking-widest border border-blue-500/30">
                            <i data-lucide="activity" class="w-3 h-3"></i> Operação: Florianópolis Ativa
                        </div>
                        <h1 class="text-5xl md:text-7xl font-black tracking-tighter italic leading-none">
                            SENTINELA <span class="text-blue-500">STP</span>
                        </h1>
                        <p class="text-slate-400 font-medium uppercase text-xs md:text-sm tracking-[0.3em]">Roadmap para a Soberania da Mobilidade Urbana</p>
                    </div>

                    <div class="grid grid-cols-2 gap-4 w-full md:w-auto">
                        <div class="bg-slate-950/80 p-6 rounded-3xl border border-slate-800 text-center flex-1 min-w-[160px]">
                            <p class="text-[10px] font-black text-slate-500 uppercase mb-1">Status Geral</p>
                            ${isEditMode ? `<input type="number" class="edit-input text-center text-green-500 font-black" value="${appData.progress}" onchange="appData.progress=this.value; render()">` : `<p class="text-2xl font-black text-green-500 italic">${appData.progress}%</p>`}
                            <div class="w-full bg-slate-800 h-1.5 mt-2 rounded-full overflow-hidden">
                                <div class="bg-green-500 h-full transition-all duration-1000" style="width: ${appData.progress}%"></div>
                            </div>
                        </div>
                        <div class="bg-slate-950 p-0 rounded-3xl text-center flex-1 shadow-lg shadow-black/40 min-w-[160px] flex items-center justify-center overflow-hidden border border-slate-800">
                            ${ddayHTML}
                        </div>
                    </div>
                </header>

                <!-- Documentos e Orçamentos -->
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div class="glass-panel p-8 rounded-[2.5rem] border-blue-500/20">
                        <div class="flex justify-between items-center mb-6">
                            <div class="flex items-center gap-4 text-blue-400">
                                <i data-lucide="file-text" size="24"></i>
                                <h3 class="text-xl font-black uppercase italic tracking-tighter">Documentos Criados</h3>
                            </div>
                            <button onclick="addDocument()" class="admin-only bg-blue-600/20 text-blue-400 p-2 rounded-full hover:bg-blue-600/40 transition-all"><i data-lucide="plus"></i></button>
                        </div>
                        <ul class="space-y-3">
                            ${appData.documents.map((doc, i) => `
                                <li class="flex items-center justify-between p-3 bg-slate-950/50 rounded-2xl border border-slate-800 group">
                                    ${isEditMode ? 
                                        `<input class="edit-input text-xs font-bold" value="${doc.name}" onchange="appData.documents[${i}].name=this.value">` : 
                                        `<span class="text-xs font-bold text-slate-300">${doc.name}</span>`
                                    }
                                    <div class="flex items-center gap-2">
                                        <span class="badge ${doc.type === 'success' ? 'bg-green-500/10 text-green-400 border-green-500/20' : doc.type === 'warning' ? 'bg-yellow-500/10 text-yellow-400 border-yellow-500/20 animate-pulse' : 'bg-blue-500/10 text-blue-400 border-blue-500/20'}">
                                            ${isEditMode ? 
                                                `<select class="bg-transparent" onchange="appData.documents[${i}].status=this.value; render()">
                                                    <option value="Finalizado">Finalizado</option>
                                                    <option value="Aguardando">Aguardando</option>
                                                    <option value="Aprovado">Aprovado</option>
                                                </select>` : doc.status
                                            }
                                        </span>
                                        <button onclick="removeDocument(${i})" class="admin-only text-red-500/50 hover:text-red-500"><i data-lucide="trash-2" size="14"></i></button>
                                    </div>
                                </li>
                            `).join('')}
                        </ul>
                    </div>

                    <div class="glass-panel p-8 rounded-[2.5rem] border-purple-500/20">
                        <div class="flex justify-between items-center mb-6">
                            <div class="flex items-center gap-4 text-purple-400">
                                <i data-lucide="banknote" size="24"></i>
                                <h3 class="text-xl font-black uppercase italic tracking-tighter">Planejamento Orçamentário</h3>
                            </div>
                            <button onclick="addBudgetGroup()" class="admin-only bg-purple-600/20 text-purple-400 p-2 rounded-full hover:bg-purple-600/40 transition-all"><i data-lucide="plus"></i></button>
                        </div>
                        <div class="space-y-8">
                            ${appData.budgetGroups.map((group, gIdx) => {
                                const groupTotal = group.items.reduce((acc, curr) => acc + curr.value, 0);
                                return `
                                    <div class="space-y-4 bg-slate-900/20 p-4 rounded-3xl border border-slate-800/50">
                                        <div class="flex justify-between items-center">
                                            ${isEditMode ? 
                                                `<input class="edit-input text-xs font-black text-purple-300 uppercase" value="${group.name}" onchange="appData.budgetGroups[${gIdx}].name=this.value">` : 
                                                `<h4 class="text-xs font-black text-purple-300 uppercase tracking-widest">${group.name}</h4>`
                                            }
                                            <div class="flex items-center gap-2">
                                                <button onclick="addBudgetItem(${gIdx})" class="admin-only text-purple-500/50 hover:text-purple-500"><i data-lucide="plus-circle" size="14"></i></button>
                                                <button onclick="removeBudgetGroup(${gIdx})" class="admin-only text-red-500/50 hover:text-red-500"><i data-lucide="trash-2" size="14"></i></button>
                                            </div>
                                        </div>
                                        
                                        <div class="space-y-3">
                                            ${group.items.map((item, iIdx) => `
                                                <div class="flex justify-between items-end border-b border-slate-800 pb-2">
                                                    ${isEditMode ? 
                                                        `<input class="edit-input text-[10px] font-black" value="${item.label}" onchange="appData.budgetGroups[${gIdx}].items[${iIdx}].label=this.value">` : 
                                                        `<p class="text-[10px] font-black text-slate-500 uppercase">${item.label}</p>`
                                                    }
                                                    <div class="flex items-center gap-2">
                                                        ${isEditMode ? 
                                                            `<input type="number" class="edit-input text-right text-sm font-bold" value="${item.value}" onchange="appData.budgetGroups[${gIdx}].items[${iIdx}].value=Number(this.value); render()">` : 
                                                            `<p class="text-sm font-bold text-slate-200">R$ ${item.value.toLocaleString('pt-BR', {minimumFractionDigits: 2})}</p>`
                                                        }
                                                        <button onclick="removeBudgetItem(${gIdx}, ${iIdx})" class="admin-only text-red-500/50 hover:text-red-500"><i data-lucide="trash-2" size="14"></i></button>
                                                    </div>
                                                </div>
                                            `).join('')}
                                        </div>

                                        <div class="flex justify-between items-center pt-2">
                                            <p class="text-[9px] font-black text-slate-500 uppercase">Subtotal ${group.name}</p>
                                            <p class="text-xs font-black text-slate-300">R$ ${groupTotal.toLocaleString('pt-BR', {minimumFractionDigits: 2})}</p>
                                        </div>
                                    </div>
                                `;
                            }).join('')}
                            
                            <div class="flex justify-between items-center p-4 bg-purple-600/10 rounded-2xl border border-purple-500/30 mt-4">
                                <p class="text-xs font-black text-purple-400 uppercase tracking-widest">Total Geral</p>
                                <p class="text-xl font-black text-purple-400 italic">R$ ${totalBudget.toLocaleString('pt-BR', {minimumFractionDigits: 2})}</p>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Timeline -->
                <section class="relative space-y-16 py-10">
                    <div class="roadmap-line hidden md:block"></div>

                    ${appData.milestones.map((ms, i) => {
                        const isEven = i % 2 === 0;
                        return `
                        <!-- Hover Zone to add BEFORE this milestone -->
                        ${isEditMode ? `
                            <div class="add-milestone-zone">
                                <div class="add-milestone-btn" onclick="addMilestoneAt(${i})" title="Inserir marco aqui">
                                    <i data-lucide="plus" size="14"></i>
                                </div>
                            </div>
                        ` : ''}

                        <div class="milestone-row flex flex-col md:flex-row items-center justify-between gap-8 md:gap-0 relative transition-all duration-300" 
                             draggable="${isEditMode}" 
                             ondragstart="onDragStart(${i})" 
                             ondragover="onDragOver(${i})" 
                             ondragleave="onDragLeave(${i})"
                             ondrop="onDrop(${i})">
                            <!-- Lado Esquerdo -->
                            <div class="md:w-[45%] ${isEven ? 'text-right order-2 md:order-1' : 'flex justify-center md:justify-end order-1'}">
                                ${isEven ? renderMilestoneCard(ms, i) : renderMilestoneIcon(ms, i)}
                            </div>
                            
                            <!-- Dot Central -->
                            <div class="status-dot ${ms.status} hidden md:block"></div>
                            
                            <!-- Lado Direito -->
                            <div class="md:w-[45%] ${isEven ? 'order-1 md:order-2 flex justify-center md:justify-start' : 'text-left order-2'}">
                                ${isEven ? renderMilestoneIcon(ms, i) : renderMilestoneCard(ms, i)}
                            </div>

                            ${isEditMode ? `<button onclick="removeMilestone(${i})" class="absolute top-0 right-0 text-red-500 p-2 bg-slate-900 rounded-full border border-slate-800 z-50"><i data-lucide="trash-2"></i></button>` : ''}
                        </div>
                        `
                    }).join('')}

                    <!-- Final Hover Zone -->
                    ${isEditMode ? `
                        <div class="add-milestone-zone">
                            <div class="add-milestone-btn" onclick="addMilestoneAt(appData.milestones.length)" title="Inserir marco no final">
                                <i data-lucide="plus" size="14"></i>
                            </div>
                        </div>
                    ` : ''}
                </section>

                <!-- Footer Banner -->
                <footer class="relative bg-blue-600 p-12 md:p-16 rounded-[4rem] text-center shadow-2xl overflow-hidden group">
                    <div class="absolute inset-0 bg-black/10"></div>
                    <div class="relative z-10 space-y-6">
                        <h2 class="text-2xl md:text-4xl font-black tracking-tight uppercase italic max-w-2xl mx-auto leading-tight">
                            "Não é sobre esperar o ônibus. É sobre retomar o que é nosso."
                        </h2>
                        <div class="pt-8 border-t border-white/20 flex flex-wrap justify-center gap-6 md:gap-12 text-[10px] font-black uppercase tracking-[0.5em]">
                            <span class="flex items-center gap-2"><i data-lucide="map-pin" class="w-3 h-3"></i> Florianópolis, SC</span>
                            <span>Instituto Sentinela STP</span>
                            <span>SenTec Intelligence</span>
                        </div>
                    </div>
                </footer>
            `;
            
            lucide.createIcons();
        }

        function renderMilestoneCard(ms, i) {
            const tasks = ms.tasks || [];
            const completedTasks = tasks.filter(t => t.completed).length;
            const progress = tasks.length > 0 ? Math.round((completedTasks / tasks.length) * 100) : 0;
            const linkedGroup = appData.budgetGroups.find(g => g.id === ms.budgetGroupId);

            return `
                <div class="milestone-card bg-slate-900/40 p-8 rounded-[2.5rem] space-y-4">
                    <div class="flex justify-between items-start">
                        <div class="flex flex-col gap-1">
                            ${isEditMode ? `
                                <div class="flex flex-col gap-2">
                                    <input class="edit-input text-[10px] font-black text-blue-400" value="${ms.date}" onchange="appData.milestones[${i}].date=this.value" placeholder="Texto da Data (Ex: 17 de Março)">
                                    <input type="date" class="edit-input text-[10px] font-black text-slate-400" value="${ms.targetDate || ''}" onchange="appData.milestones[${i}].targetDate=this.value">
                                </div>
                            ` : `<span class="text-[10px] font-black ${ms.status === 'completed' ? 'text-green-500' : 'text-blue-400'} uppercase tracking-widest">${ms.date}</span>`}
                        </div>
                        
                        ${linkedGroup ? `
                            <div class="flex items-center gap-1.5 bg-purple-500/10 px-3 py-1 rounded-full border border-purple-500/20">
                                <i data-lucide="link" size="10" class="text-purple-400"></i>
                                <span class="text-[8px] font-black text-purple-400 uppercase">${linkedGroup.name}</span>
                            </div>
                        ` : ''}
                    </div>

                    ${isEditMode ? `<input class="edit-input text-2xl font-black italic" value="${ms.title}" onchange="appData.milestones[${i}].title=this.value">` : `<h3 class="text-2xl font-black italic uppercase">${ms.title}</h3>`}
                    ${isEditMode ? `<textarea class="edit-input text-sm text-slate-400" onchange="appData.milestones[${i}].desc=this.value">${ms.desc}</textarea>` : `<p class="text-sm text-slate-400 leading-relaxed">${ms.desc}</p>`}
                    
                    <!-- Barra de Progresso do Marco -->
                    <div class="space-y-1.5">
                        <div class="flex justify-between text-[9px] font-black uppercase tracking-tighter">
                            <span class="text-slate-500">Progresso do Objetivo</span>
                            <span class="${progress === 100 ? 'text-green-400' : 'text-blue-400'}">${progress}%</span>
                        </div>
                        <div class="w-full bg-slate-800/50 h-1 rounded-full overflow-hidden">
                            <div class="h-full transition-all duration-700 ${progress === 100 ? 'bg-green-500' : 'bg-blue-500'}" style="width: ${progress}%"></div>
                        </div>
                    </div>

                    <!-- Lista de Tarefas -->
                    <div class="space-y-2 pt-2">
                        <div class="flex justify-between items-center">
                            <span class="text-[9px] font-black text-slate-500 uppercase tracking-widest">Tarefas Estratégicas</span>
                            <button onclick="addTask(${i})" class="admin-only text-blue-400 hover:text-blue-300"><i data-lucide="plus-circle" size="12"></i></button>
                        </div>
                        <div class="grid grid-cols-1 gap-2">
                            ${tasks.map((task, tIdx) => `
                                <div class="flex items-center justify-between gap-2 p-2 bg-slate-950/30 rounded-xl border border-white/5 group">
                                    <div class="flex items-center gap-2 flex-1">
                                        <button onclick="toggleTask(${i}, ${tIdx})" class="flex-none transition-all ${task.completed ? 'text-green-500' : 'text-slate-600 hover:text-blue-400'}">
                                            <i data-lucide="${task.completed ? 'check-circle' : 'circle'}" size="14"></i>
                                        </button>
                                        ${isEditMode ? 
                                            `<input class="edit-input text-[11px] font-medium" value="${task.title}" onchange="appData.milestones[${i}].tasks[${tIdx}].title=this.value">` : 
                                            `<span class="text-[11px] font-medium ${task.completed ? 'text-slate-500 line-through' : 'text-slate-300'}">${task.title}</span>`
                                        }
                                    </div>
                                    <button onclick="removeTask(${i}, ${tIdx})" class="admin-only opacity-0 group-hover:opacity-100 text-red-500/50 hover:text-red-500 transition-all">
                                        <i data-lucide="x" size="12"></i>
                                    </button>
                                </div>
                            `).join('')}
                        </div>
                    </div>

                    <div class="flex flex-wrap ${i % 2 === 0 ? 'justify-end' : 'justify-start'} gap-2 pt-2">
                        ${ms.tags.map(tag => `<span class="badge bg-slate-800 text-slate-400 border-slate-700">${tag}</span>`).join('')}
                        ${isEditMode ? `<button class="text-[9px] text-blue-500 underline" onclick="const t=prompt('Nova Tag'); if(t) {appData.milestones[${i}].tags.push(t); render();}">+ tag</button>` : ''}
                    </div>

                    ${isEditMode ? `
                        <div class="pt-4 border-t border-slate-800 flex flex-col gap-4">
                            <div class="flex gap-2 justify-center">
                                <button onclick="appData.milestones[${i}].status='completed'; render()" class="text-[8px] bg-green-500/20 text-green-500 p-1 rounded">Feito</button>
                                <button onclick="appData.milestones[${i}].status='in-progress'; render()" class="text-[8px] bg-blue-500/20 text-blue-500 p-1 rounded">Atual</button>
                                <button onclick="appData.milestones[${i}].status='future'; render()" class="text-[8px] bg-slate-800 text-slate-500 p-1 rounded">Futuro</button>
                            </div>
                            <div class="flex flex-col gap-1">
                                <label class="text-[8px] font-black text-slate-500 uppercase text-center">Vincular Orçamento</label>
                                <select class="bg-slate-900 text-[10px] text-slate-400 border border-slate-700 rounded p-1" onchange="appData.milestones[${i}].budgetGroupId=this.value; render()">
                                    <option value="">Sem vínculo</option>
                                    ${appData.budgetGroups.map(g => `<option value="${g.id}" ${ms.budgetGroupId === g.id ? 'selected' : ''}>${g.name}</option>`).join('')}
                                </select>
                            </div>
                        </div>
                    ` : ''}
                </div>
            `;
        }

        function renderMilestoneIcon(ms, i) {
            const icons = [
                'check-circle', 'brain', 'landmark', 'shield', 'rocket', 'flag', 
                'activity', 'zap', 'target', 'users', 'star', 'alert-circle', 
                'clock', 'calendar', 'file-text', 'map', 'camera', 'bus', 'settings'
            ];
            
            return `
                <div class="flex flex-col items-center gap-3">
                    <div class="p-4 ${ms.status === 'completed' ? 'bg-green-600/10 text-green-500 border-green-600/20' : ms.status === 'in-progress' ? 'bg-blue-600/10 text-blue-500 border-blue-600/20' : 'bg-slate-800 text-slate-500 border-slate-700'} rounded-full border">
                        <i data-lucide="${ms.icon || 'circle'}" size="32"></i>
                    </div>
                    ${isEditMode ? `
                        <select class="bg-slate-900 text-[10px] border border-slate-700 rounded px-1 py-0.5 text-slate-400 outline-none focus:border-blue-500" 
                                onchange="appData.milestones[${i}].icon=this.value; render()">
                            ${icons.map(icon => `<option value="${icon}" ${ms.icon === icon ? 'selected' : ''}>${icon}</option>`).join('')}
                        </select>
                    ` : ''}
                </div>
            `;
        }

        // Init
        render();
    </script>
</body>
</html>
