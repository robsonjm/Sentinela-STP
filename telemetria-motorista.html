    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { initializeFirestore, collection, doc, setDoc, updateDoc, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { firebaseConfig } from "./js/config.js?v=3";

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = initializeFirestore(app, { experimentalAutoDetectLongPolling: true, useFetchStreams: false });

        let user = null;
        signInAnonymously(auth);
        onAuthStateChanged(auth, (u) => {
            user = u;
            window.__telemetryUser = u;
        });

        const BASE = ['artifacts', 'sentinela-stp', 'public', 'data', 'telemetria_viagens'];

        window.telemetryCloud = {
            createTrip: async (meta) => {
                if (!user) throw new Error('auth-not-ready');
                const tripsCol = collection(db, ...BASE);
                const tripRef = doc(tripsCol);
                await setDoc(tripRef, {
                    ownerUid: user.uid,
                    status: 'active',
                    startedAt: serverTimestamp(),
                    startedAtMs: Date.now(),
                    meta
                });
                return tripRef.id;
            },
            addChunk: async (tripId, chunk) => {
                if (!user) throw new Error('auth-not-ready');
                const chunkCol = collection(db, ...BASE, tripId, 'chunks');
                await addDoc(chunkCol, { ...chunk, createdAt: serverTimestamp() });
            },
            finishTrip: async (tripId, summary) => {
                if (!user) throw new Error('auth-not-ready');
                const tripRef = doc(db, ...BASE, tripId);
                await updateDoc(tripRef, {
                    status: 'ended',
                    endedAt: serverTimestamp(),
                    endedAtMs: Date.now(),
                    summary
                });
            }
        };
    </script>
    
    <script>
        lucide.createIcons();
        
        const THRESHOLD_DB = 85;
        const THRESHOLD_G = 1.5;
        const GRAVITY = 9.80665;
        
        const gpsDot = document.getElementById('gps-dot');
        const micDot = document.getElementById('mic-dot');
        const motDot = document.getElementById('mot-dot');
        const recDot = document.getElementById('rec-dot');
        const recLabel = document.getElementById('rec-label');
        
        const dbNowEl = document.getElementById('db-now');
        const dbMaxEl = document.getElementById('db-max');
        const dbBar = document.getElementById('db-bar');
        
        const gNowEl = document.getElementById('g-now');
        const gMaxEl = document.getElementById('g-max');
        const gBar = document.getElementById('g-bar');
        
        const tripStatusEl = document.getElementById('trip-status');
        const tripDurationEl = document.getElementById('trip-duration');
        const tripDistanceEl = document.getElementById('trip-distance');
        const alertsDbEl = document.getElementById('alerts-db');
        const alertsGEl = document.getElementById('alerts-g');
        
        const alertBanner = document.getElementById('alert-banner');
        const alertText = document.getElementById('alert-text');
        const dismissAlertBtn = document.getElementById('dismiss-alert');
        let alertAutoHideTimer = null;
        
        const permissionsBtn = document.getElementById('permissions-btn');
        const startBtn = document.getElementById('start-btn');
        const stopBtn = document.getElementById('stop-btn');
        const downloadBtn = document.getElementById('download-btn');
        const clearBtn = document.getElementById('clear-btn');
        const eventsEl = document.getElementById('events');
        const copyLastBtn = document.getElementById('copy-last-btn');
        
        const tempExtEl = document.getElementById('temp-ext');
        const tempEstEl = document.getElementById('temp-est');
        
        let permissionsGranted = false;
        let isRecording = false;
        
        let audioCtx = null;
        let analyser = null;
        let dataArr = null;
        let userStream = null;
        let rafId = null;
        
        let geoWatchId = null;
        let lastPos = null;
        
        let currentDb = null;
        let maxDb = null;
        
        let currentG = null;
        let maxG = null;
        let gravityVec = { x: 0, y: 0, z: 0 };
        let gravityReady = false;
        
        let alertsDb = 0;
        let alertsG = 0;
        let lastAlertDbAt = 0;
        let lastAlertGAt = 0;
        
        let startedAt = null;
        let durationTimer = null;
        
        let distanceKm = 0;
        
        let trip = null;
        let cloudTripId = null;
        let cloudSamples = [];
        let cloudGps = [];
        let cloudEvents = [];
        let cloudFlushTimer = null;
        let lastStoredSampleAt = 0;
        
        const map = L.map('map', { zoomControl: false }).setView([-27.5945, -48.5477], 13);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', { maxZoom: 20 }).addTo(map);
        
        const trackPolyline = L.polyline([], { color: '#2563eb', weight: 4, opacity: 0.9 }).addTo(map);
        const marker = L.circleMarker([-27.5945, -48.5477], { radius: 8, color: '#0f172a', weight: 2, fillColor: '#3b82f6', fillOpacity: 1 }).addTo(map);
        
        function setDot(dotEl, ok) {
            dotEl.className = ok ? "status-dot bg-green-500 shadow-[0_0_8px_rgba(34,197,94,0.4)]" : "status-dot bg-slate-500";
        }
        
        function fmtTime(ms) {
            const s = Math.max(0, Math.floor(ms / 1000));
            const hh = String(Math.floor(s / 3600)).padStart(2, '0');
            const mm = String(Math.floor((s % 3600) / 60)).padStart(2, '0');
            const ss = String(s % 60).padStart(2, '0');
            return `${hh}:${mm}:${ss}`;
        }
        
        function haversineKm(a, b) {
            const R = 6371;
            const dLat = (b.lat - a.lat) * Math.PI / 180;
            const dLng = (b.lng - a.lng) * Math.PI / 180;
            const lat1 = a.lat * Math.PI / 180;
            const lat2 = b.lat * Math.PI / 180;
            const x = Math.sin(dLat / 2) ** 2 + Math.cos(lat1) * Math.cos(lat2) * (Math.sin(dLng / 2) ** 2);
            return 2 * R * Math.asin(Math.min(1, Math.sqrt(x)));
        }
        
        function showAlert(message, autoHideMs = 4500) {
            alertText.textContent = message;
            alertBanner.classList.remove('hidden');
            if (alertAutoHideTimer) clearTimeout(alertAutoHideTimer);
            alertAutoHideTimer = setTimeout(() => hideAlert(), autoHideMs);
        }
        
        function hideAlert() {
            alertBanner.classList.add('hidden');
            if (alertAutoHideTimer) clearTimeout(alertAutoHideTimer);
            alertAutoHideTimer = null;
        }
        
        function addEvent(kind, payload) {
            const now = new Date();
            const item = {
                ts: now.toISOString(),
                kind,
                ...payload
            };
            if (trip) trip.events.push(item);
            if (isRecording) cloudEvents.push(item);
            
            const el = document.createElement('div');
            el.className = 'bg-slate-50 border border-slate-200 rounded-xl p-3 flex items-start justify-between gap-3';
            const left = document.createElement('div');
            left.className = 'min-w-0';
            const title = document.createElement('p');
            title.className = 'text-[10px] font-black text-slate-400 uppercase tracking-widest';
            title.textContent = kind;
            const msg = document.createElement('p');
            msg.className = 'text-sm font-bold text-slate-800 leading-tight break-words';
            msg.textContent = payload && payload.message ? payload.message : '';
            const meta = document.createElement('p');
            meta.className = 'text-[10px] font-bold text-slate-400 mt-1';
            meta.textContent = now.toLocaleString();
            left.appendChild(title);
            left.appendChild(msg);
            left.appendChild(meta);
            const tag = document.createElement('span');
            tag.className = 'text-[10px] font-black uppercase tracking-widest px-2 py-1 rounded-lg bg-white border border-slate-200 text-slate-600';
            tag.textContent = payload && payload.tag ? payload.tag : 'LOG';
            el.appendChild(left);
            el.appendChild(tag);
            eventsEl.prepend(el);
        }
        
        function updateTemperatureEstimate() {
            const extRaw = tempExtEl.value;
            if (extRaw === '' || extRaw == null) {
                tempEstEl.textContent = '—';
                return;
            }
            const ext = Number(extRaw);
            if (!Number.isFinite(ext)) {
                tempEstEl.textContent = '—';
                return;
            }
            const estimated = ext + 6;
            tempEstEl.textContent = `${estimated.toFixed(1)}°C`;
        }
        
        tempExtEl.addEventListener('input', updateTemperatureEstimate);
        
        dismissAlertBtn.addEventListener('click', hideAlert);
        
        copyLastBtn.addEventListener('click', async () => {
            const last = trip && trip.events && trip.events.length > 0 ? trip.events[trip.events.length - 1] : null;
            const text = last ? JSON.stringify(last, null, 2) : '';
            if (!text) return;
            try {
                await navigator.clipboard.writeText(text);
            } catch {
                const ta = document.createElement('textarea');
                ta.value = text;
                document.body.appendChild(ta);
                ta.select();
                document.execCommand('copy');
                ta.remove();
            }
        });
        
        async function flushCloud(force = false) {
            if (!cloudTripId || !window.telemetryCloud) return;
            const hasData = cloudSamples.length > 0 || cloudGps.length > 0 || cloudEvents.length > 0;
            if (!hasData) return;

            const chunk = {
                samples: cloudSamples,
                gps: cloudGps,
                events: cloudEvents
            };
            if (!force && cloudSamples.length < 50 && cloudGps.length < 25 && cloudEvents.length < 1) return;

            cloudSamples = [];
            cloudGps = [];
            cloudEvents = [];
            try {
                await window.telemetryCloud.addChunk(cloudTripId, chunk);
            } catch (e) {
                console.error(e);
            }
        }

        async function requestPermissions() {
            try {
                userStream = await navigator.mediaDevices.getUserMedia({ audio: true });
                setDot(micDot, true);
                
                if (typeof DeviceMotionEvent !== 'undefined' && typeof DeviceMotionEvent.requestPermission === 'function') {
                    const resp = await DeviceMotionEvent.requestPermission();
                    if (resp !== 'granted') throw new Error('Motion permission denied');
                }
                
                window.addEventListener('devicemotion', (event) => {
                    const accLin = event.acceleration;
                    const accInc = event.accelerationIncludingGravity;
                    let gImpact = null;

                    if (accLin && (accLin.x != null || accLin.y != null || accLin.z != null)) {
                        const ax = Number(accLin.x || 0);
                        const ay = Number(accLin.y || 0);
                        const az = Number(accLin.z || 0);
                        gImpact = Math.sqrt(ax * ax + ay * ay + az * az) / GRAVITY;
                    } else if (accInc && (accInc.x != null || accInc.y != null || accInc.z != null)) {
                        const ax = Number(accInc.x || 0);
                        const ay = Number(accInc.y || 0);
                        const az = Number(accInc.z || 0);

                        if (!gravityReady) {
                            gravityVec = { x: ax, y: ay, z: az };
                            gravityReady = true;
                        } else {
                            const alpha = 0.8;
                            gravityVec = {
                                x: alpha * gravityVec.x + (1 - alpha) * ax,
                                y: alpha * gravityVec.y + (1 - alpha) * ay,
                                z: alpha * gravityVec.z + (1 - alpha) * az
                            };
                        }

                        const lx = ax - gravityVec.x;
                        const ly = ay - gravityVec.y;
                        const lz = az - gravityVec.z;
                        gImpact = Math.sqrt(lx * lx + ly * ly + lz * lz) / GRAVITY;
                    }

                    if (gImpact == null) return;

                    currentG = Math.max(0, gImpact);
                    if (!maxG || currentG > maxG) maxG = currentG;
                    gNowEl.textContent = currentG ? currentG.toFixed(2) : '0.00';
                    gMaxEl.textContent = maxG ? maxG.toFixed(2) : '0.00';
                    gBar.style.width = `${Math.min((currentG / 3) * 100, 100)}%`;
                    setDot(motDot, true);
                    
                    if (isRecording && currentG >= THRESHOLD_G) {
                        const now = Date.now();
                        if (now - lastAlertGAt >= 5000) {
                            lastAlertGAt = now;
                            alertsG += 1;
                            alertsGEl.textContent = String(alertsG);
                            const msg = `Impacto acima de ${THRESHOLD_G.toFixed(1)}G (pico ${currentG.toFixed(2)}G)`;
                            showAlert(msg);
                            addEvent('ALERTA G', { message: msg, tag: 'G', g: currentG, lat: lastPos ? lastPos.lat : null, lng: lastPos ? lastPos.lng : null, tsMs: now });
                        }
                    }
                }, { passive: true });
                
                permissionsGranted = true;
                return true;
            } catch (e) {
                console.error(e);
                setDot(micDot, false);
                setDot(motDot, false);
                alert('Permissões negadas. Habilite Microfone e Movimento para iniciar.');
                return false;
            }
        }
        
        function startGps() {
            if (!navigator.geolocation) {
                alert('Este dispositivo não possui suporte a GPS.');
                return;
            }
            
            geoWatchId = navigator.geolocation.watchPosition((p) => {
                const point = {
                    lat: p.coords.latitude,
                    lng: p.coords.longitude,
                    acc: p.coords.accuracy,
                    speed: p.coords.speed,
                    heading: p.coords.heading,
                    ts: Date.now()
                };
                
                setDot(gpsDot, true);
                
                marker.setLatLng([point.lat, point.lng]);
                trackPolyline.addLatLng([point.lat, point.lng]);
                map.panTo([point.lat, point.lng], { animate: true, duration: 0.25 });
                
                if (lastPos) {
                    const d = haversineKm(lastPos, point);
                    if (Number.isFinite(d) && d < 1) {
                        distanceKm += d;
                        tripDistanceEl.textContent = distanceKm.toFixed(2);
                    }
                }
                
                lastPos = point;
                if (trip) trip.gps.push(point);
                if (isRecording) cloudGps.push(point);
                if (cloudGps.length >= 100) flushCloud(true);
            }, (err) => {
                console.error(err);
                setDot(gpsDot, false);
                alert('Falha ao obter GPS. Ative a localização.');
            }, { enableHighAccuracy: true, maximumAge: 0, timeout: 15000 });
        }
        
        function stopGps() {
            if (geoWatchId != null) {
                navigator.geolocation.clearWatch(geoWatchId);
                geoWatchId = null;
            }
            setDot(gpsDot, false);
        }
        
        function ensureAudio() {
            const AC = window.AudioContext || window.webkitAudioContext;
            if (!audioCtx) audioCtx = new AC();
            analyser = audioCtx.createAnalyser();
            analyser.fftSize = 2048;
            dataArr = new Uint8Array(analyser.frequencyBinCount);
            const mic = audioCtx.createMediaStreamSource(userStream);
            mic.connect(analyser);
        }
        
        function sampleDb() {
            if (!isRecording || !analyser) return;
            analyser.getByteTimeDomainData(dataArr);
            let sum = 0;
            for (let i = 0; i < dataArr.length; i++) {
                const n = (dataArr[i] - 128) / 128;
                sum += n * n;
            }
            const rms = Math.sqrt(sum / dataArr.length) || 0.0001;
            const db = Math.round(20 * Math.log10(rms) + 105);
            currentDb = Math.max(30, db);
            if (!maxDb || currentDb > maxDb) maxDb = currentDb;
            
            dbNowEl.textContent = String(currentDb);
            dbMaxEl.textContent = maxDb ? String(maxDb) : '—';
            dbBar.style.width = `${Math.min((currentDb / 110) * 100, 100)}%`;
            
            if (trip) {
                const now = Date.now();
                if (now - lastStoredSampleAt >= 1000) {
                    lastStoredSampleAt = now;
                    const sample = {
                        ts: now,
                        db: currentDb,
                        g: currentG,
                        lat: lastPos ? lastPos.lat : null,
                        lng: lastPos ? lastPos.lng : null
                    };
                    trip.samples.push(sample);
                    cloudSamples.push(sample);
                    if (cloudSamples.length >= 200) flushCloud(true);
                }
            }
            
            if (currentDb >= THRESHOLD_DB) {
                const now = Date.now();
                if (now - lastAlertDbAt >= 5000) {
                    lastAlertDbAt = now;
                    alertsDb += 1;
                    alertsDbEl.textContent = String(alertsDb);
                    const msg = `Ruído acima de ${THRESHOLD_DB}dB (${currentDb}dB)`;
                    showAlert(msg);
                    addEvent('ALERTA dB', { message: msg, tag: 'dB', db: currentDb, lat: lastPos ? lastPos.lat : null, lng: lastPos ? lastPos.lng : null, tsMs: now });
                }
            }
            
            rafId = requestAnimationFrame(sampleDb);
        }
        
        function startDurationTimer() {
            if (durationTimer) clearInterval(durationTimer);
            durationTimer = setInterval(() => {
                if (!startedAt) return;
                tripDurationEl.textContent = fmtTime(Date.now() - startedAt);
            }, 500);
        }
        
        function stopDurationTimer() {
            if (durationTimer) clearInterval(durationTimer);
            durationTimer = null;
        }
        
        function resetUi() {
            hideAlert();
            dbNowEl.textContent = '—';
            dbMaxEl.textContent = '—';
            dbBar.style.width = '0%';
            gNowEl.textContent = '—';
            gMaxEl.textContent = '—';
            gBar.style.width = '0%';
            tripDurationEl.textContent = '00:00:00';
            tripDistanceEl.textContent = '0.00';
            alertsDbEl.textContent = '0';
            alertsGEl.textContent = '0';
            tripStatusEl.textContent = 'Aguardando';
            eventsEl.innerHTML = '';
            setDot(gpsDot, false);
            setDot(micDot, permissionsGranted);
            setDot(motDot, permissionsGranted);
            setDot(recDot, false);
            recLabel.textContent = 'OFF';
        }
        
        function downloadTrip() {
            if (!trip) return;
            const payload = {
                version: 1,
                exportedAt: new Date().toISOString(),
                trip
            };
            const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json;charset=utf-8' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            const pad = (n) => String(n).padStart(2, '0');
            const dt = new Date();
            const file = `telemetria_${dt.getFullYear()}-${pad(dt.getMonth() + 1)}-${pad(dt.getDate())}_${pad(dt.getHours())}-${pad(dt.getMinutes())}-${pad(dt.getSeconds())}.json`;
            a.href = url;
            a.download = file;
            document.body.appendChild(a);
            a.click();
            a.remove();
            URL.revokeObjectURL(url);
        }
        
        permissionsBtn.addEventListener('click', async () => {
            if (permissionsGranted) return;
            const ok = await requestPermissions();
            if (ok) {
                setDot(micDot, true);
                setDot(motDot, true);
            }
        });
        
        startBtn.addEventListener('click', async () => {
            const line = document.getElementById('bus-line').value.trim();
            if (!line) {
                alert('Informe a linha.');
                return;
            }
            
            if (!permissionsGranted) {
                const ok = await requestPermissions();
                if (!ok) return;
            }
            
            if (!userStream) {
                alert('Microfone indisponível.');
                return;
            }
            
            try {
                if (audioCtx && audioCtx.state === 'suspended') await audioCtx.resume();
                ensureAudio();
            } catch (e) {
                console.error(e);
                alert('Falha ao iniciar áudio.');
                return;
            }
            
            isRecording = true;
            startedAt = Date.now();
            distanceKm = 0;
            lastPos = null;
            maxDb = null;
            maxG = null;
            lastStoredSampleAt = 0;
            alertsDb = 0;
            alertsG = 0;
            lastAlertDbAt = 0;
            lastAlertGAt = 0;
            cloudTripId = null;
            cloudSamples = [];
            cloudGps = [];
            cloudEvents = [];
            
            trip = {
                id: crypto.randomUUID ? crypto.randomUUID() : String(Date.now()),
                startedAt: new Date(startedAt).toISOString(),
                endedAt: null,
                meta: {
                    linha: line,
                    prefixo: document.getElementById('bus-prefix').value.trim() || 'S/N',
                    temp_externa_c: tempExtEl.value === '' ? null : Number(tempExtEl.value),
                    temp_estimada_c: tempExtEl.value === '' ? null : Number((Number(tempExtEl.value) + 6).toFixed(1)),
                    thresholds: { db: THRESHOLD_DB, g: THRESHOLD_G }
                },
                gps: [],
                samples: [],
                events: []
            };

            if (window.telemetryCloud) {
                try {
                    cloudTripId = await window.telemetryCloud.createTrip(trip.meta);
                } catch (e) {
                    console.error(e);
                    cloudTripId = null;
                }
            }
            
            tripStatusEl.textContent = 'Em andamento';
            setDot(recDot, true);
            recLabel.textContent = 'ON';
            
            startBtn.classList.add('hidden');
            stopBtn.classList.remove('hidden');
            downloadBtn.disabled = true;
            
            trackPolyline.setLatLngs([]);
            startGps();
            startDurationTimer();
            if (cloudFlushTimer) clearInterval(cloudFlushTimer);
            cloudFlushTimer = setInterval(() => flushCloud(false), 10000);
            sampleDb();
        });
        
        stopBtn.addEventListener('click', async () => {
            isRecording = false;
            setDot(recDot, false);
            recLabel.textContent = 'OFF';
            tripStatusEl.textContent = 'Encerrada';
            
            stopGps();
            stopDurationTimer();
            if (rafId) cancelAnimationFrame(rafId);
            rafId = null;
            
            try {
                if (userStream) {
                    userStream.getTracks().forEach(t => t.stop());
                    userStream = null;
                }
            } catch (e) { console.error(e); }
            
            try {
                if (audioCtx) {
                    await audioCtx.close();
                    audioCtx = null;
                }
            } catch (e) { console.error(e); }
            
            setDot(micDot, false);
            
            if (trip) {
                trip.endedAt = new Date().toISOString();
                trip.summary = {
                    duration_ms: startedAt ? Date.now() - startedAt : null,
                    distance_km: Number(distanceKm.toFixed(3)),
                    max_db: maxDb,
                    max_g: maxG,
                    alerts_db: alertsDb,
                    alerts_g: alertsG
                };
                if (cloudFlushTimer) clearInterval(cloudFlushTimer);
                cloudFlushTimer = null;
                await flushCloud(true);
                if (cloudTripId && window.telemetryCloud) {
                    try {
                        await window.telemetryCloud.finishTrip(cloudTripId, trip.summary);
                    } catch (e) { console.error(e); }
                }
                try {
                    const key = `telemetria_trip_${trip.id}`;
                    localStorage.setItem(key, JSON.stringify(trip));
                } catch (e) { console.error(e); }
            }
            
            startBtn.classList.remove('hidden');
            stopBtn.classList.add('hidden');
            downloadBtn.disabled = false;
        });
        
        downloadBtn.addEventListener('click', downloadTrip);
        
        clearBtn.addEventListener('click', () => {
            isRecording = false;
            stopGps();
            stopDurationTimer();
            if (cloudFlushTimer) clearInterval(cloudFlushTimer);
            cloudFlushTimer = null;
            if (rafId) cancelAnimationFrame(rafId);
            rafId = null;
            trackPolyline.setLatLngs([]);
            marker.setLatLng([-27.5945, -48.5477]);
            map.setView([-27.5945, -48.5477], 13);
            startedAt = null;
            distanceKm = 0;
            trip = null;
            maxDb = null;
            maxG = null;
            currentDb = null;
            currentG = null;
            alertsDb = 0;
            alertsG = 0;
            cloudTripId = null;
            cloudSamples = [];
            cloudGps = [];
            cloudEvents = [];
            downloadBtn.disabled = true;
            startBtn.classList.remove('hidden');
            stopBtn.classList.add('hidden');
            resetUi();
        });
        
        resetUi();
        updateTemperatureEstimate();
    </script>
    <script src="version-display.js"></script>
</body>
</html>
