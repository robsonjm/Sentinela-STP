<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Sentinela STP - Painel de Telemetria</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="">
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        :root { --sat: env(safe-area-inset-top, 0px); --sab: env(safe-area-inset-bottom, 0px); }
        body { font-family: 'Inter', sans-serif; padding-bottom: calc(5rem + var(--sab)); }
        @media (min-width: 1024px) { body { padding-bottom: 0; } }
        #map { height: 56vh; min-height: 320px; }
        @media (min-width: 1024px) { #map { height: 100%; min-height: 0; } }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background-color: #cbd5e1; border-radius: 20px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
    </style>
</head>
<body class="h-[100svh] flex flex-col opacity-0 transition-opacity duration-500 bg-slate-50">
    <header class="bg-slate-900 text-white px-4 pt-[calc(0.75rem+var(--sat))] pb-3 shadow-lg sticky top-0 z-[100]">
        <div class="w-full flex items-center justify-between gap-3">
            <div class="flex items-center gap-3 min-w-0">
                <div class="bg-white/10 p-2 rounded-xl text-white backdrop-blur-sm">
                    <i data-lucide="route" size="20"></i>
                </div>
                <div class="min-w-0">
                    <h1 class="text-lg font-black tracking-tighter uppercase leading-none truncate">Painel de Telemetria</h1>
                    <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest truncate">Corridas de motoristas</p>
                </div>
            </div>
            <div class="flex items-center gap-3">
                <span id="user-email" class="text-[10px] font-mono text-slate-400 hidden sm:inline-block"></span>
                <button id="logout-btn" class="bg-red-500/20 hover:bg-red-500/40 text-red-200 p-2 rounded-lg transition-colors" title="Sair">
                    <i data-lucide="log-out" size="18"></i>
                </button>
            </div>
        </div>
    </header>

    <main class="flex-1 min-h-0 w-full p-3 sm:p-4 lg:p-4">
        <div class="grid grid-cols-1 lg:grid-cols-[420px_1fr_420px] gap-4 h-full min-h-0">
            <section class="bg-white rounded-[2rem] border border-slate-200 shadow-sm overflow-hidden min-h-0 flex flex-col">
                <div class="p-4 border-b border-slate-100">
                    <div class="flex items-center justify-between gap-3">
                        <div>
                            <h2 class="text-sm font-black text-slate-800 uppercase tracking-tight">Corridas</h2>
                            <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Selecione uma viagem</p>
                        </div>
                        <div class="bg-blue-50 text-blue-600 px-2 py-1 rounded text-[10px] font-bold uppercase tracking-widest flex items-center gap-1">
                            <i data-lucide="database" size="10"></i> <span id="trips-count">0</span>
                        </div>
                    </div>
                    <div class="mt-3 flex items-center gap-2">
                        <div class="flex-1 relative">
                            <i data-lucide="search" class="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400" size="14"></i>
                            <input id="trip-search" type="text" placeholder="Buscar linha, prefixo, UID..." class="w-full bg-slate-50 border border-slate-200 rounded-xl pl-9 pr-3 py-2.5 text-xs font-bold text-slate-800 outline-none focus:ring-2 focus:ring-blue-600 transition-all placeholder:text-slate-300">
                        </div>
                        <button id="refresh-btn" class="bg-slate-100 hover:bg-slate-200 text-slate-700 p-3 rounded-xl transition-colors border border-slate-200" title="Atualizar">
                            <i data-lucide="refresh-cw" size="16"></i>
                        </button>
                    </div>
                </div>
                <div id="trips-list" class="p-3 space-y-2 flex-1 min-h-0 overflow-y-auto custom-scrollbar">
                    <div class="text-center py-10 text-slate-400">
                        <i data-lucide="loader-2" class="animate-spin mx-auto mb-3 text-blue-500" size="24"></i>
                        <p class="text-xs font-bold uppercase tracking-widest">Carregando...</p>
                    </div>
                </div>
            </section>

            <section class="bg-white rounded-[2rem] border border-slate-200 shadow-sm overflow-hidden min-h-0 flex flex-col">
                    <div class="p-4 border-b border-slate-100 flex flex-col sm:flex-row sm:items-center sm:justify-between gap-3">
                        <div class="min-w-0">
                            <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Viagem Selecionada</p>
                            <h3 id="trip-title" class="text-base font-black text-slate-900 tracking-tight truncate">Nenhuma</h3>
                            <p id="trip-subtitle" class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mt-1 truncate">—</p>
                        </div>
                        <div class="flex items-center gap-2 flex-wrap">
                            <span id="chip-status" class="bg-slate-100 text-slate-600 px-3 py-2 rounded-xl text-[10px] font-black uppercase tracking-widest">status</span>
                            <span id="chip-distance" class="bg-slate-100 text-slate-600 px-3 py-2 rounded-xl text-[10px] font-black uppercase tracking-widest">0.00 km</span>
                            <span id="chip-duration" class="bg-slate-100 text-slate-600 px-3 py-2 rounded-xl text-[10px] font-black uppercase tracking-widest">00:00:00</span>
                            <span id="chip-max" class="bg-slate-100 text-slate-600 px-3 py-2 rounded-xl text-[10px] font-black uppercase tracking-widest">max</span>
                        </div>
                    </div>
                    <div class="flex-1 min-h-0">
                        <div id="map-wrap" class="relative">
                            <div id="map"></div>
                            <div id="replay-controls" class="absolute left-3 top-3 z-[500] bg-white/90 backdrop-blur border border-slate-200 rounded-2xl shadow-lg p-3 w-[260px]">
                                <div class="flex items-center justify-between gap-3">
                                    <p class="text-[10px] font-black uppercase tracking-widest text-slate-500">Replay</p>
                                    <div class="flex items-center gap-2">
                                        <select id="replay-speed" class="bg-white border border-slate-200 rounded-xl px-2 py-1 text-[10px] font-black text-slate-700 uppercase tracking-widest outline-none">
                                            <option value="0.5">0.5x</option>
                                            <option value="1" selected>1x</option>
                                            <option value="2">2x</option>
                                            <option value="4">4x</option>
                                        </select>
                                        <button id="replay-toggle" type="button" class="bg-blue-600 hover:bg-blue-700 text-white p-2 rounded-xl transition-colors">
                                            <i data-lucide="play" size="14"></i>
                                        </button>
                                    </div>
                                </div>
                                <div class="mt-2">
                                    <input id="replay-slider" type="range" min="0" max="0" value="0" step="1000" class="w-full accent-blue-600" disabled>
                                </div>
                                <div class="mt-2 flex items-center justify-between gap-3">
                                    <span id="replay-time" class="text-[10px] font-black text-slate-600 uppercase tracking-widest tabular-nums">00:00</span>
                                    <label class="flex items-center gap-2 text-[10px] font-black uppercase tracking-widest text-slate-600">
                                        <input id="replay-follow" type="checkbox" class="accent-blue-600">
                                        Seguir
                                    </label>
                                </div>
                            </div>
                            <div id="g-chart-card" class="absolute right-3 top-3 z-[500] bg-white/90 backdrop-blur border border-slate-200 rounded-2xl shadow-lg p-3 w-[320px]">
                                <div class="flex items-center justify-between gap-3">
                                    <p class="text-[10px] font-black uppercase tracking-widest text-slate-500">G / dB</p>
                                    <span id="g-chart-value" class="text-[10px] font-black uppercase tracking-widest text-slate-600 tabular-nums">—</span>
                                </div>
                                <svg id="g-chart" viewBox="0 0 320 120" class="mt-2 w-full h-[120px]"></svg>
                                <div class="mt-2 flex items-center justify-between gap-3">
                                    <span id="g-chart-range" class="text-[10px] font-black uppercase tracking-widest text-slate-500 tabular-nums">—</span>
                                    <span id="g-chart-hint" class="text-[10px] font-black uppercase tracking-widest text-slate-400">Picos = buracos</span>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="p-4 border-t border-slate-100 flex flex-col sm:flex-row gap-2 sm:items-center sm:justify-between">
                        <div class="flex items-center gap-2 flex-wrap">
                            <label class="flex items-center gap-2 bg-slate-50 border border-slate-200 rounded-xl px-3 py-2 text-[10px] font-black uppercase tracking-widest text-slate-600 cursor-pointer">
                                <input id="toggle-alerts-db" type="checkbox" class="accent-blue-600" checked>
                                Alertas dB
                            </label>
                            <label class="flex items-center gap-2 bg-slate-50 border border-slate-200 rounded-xl px-3 py-2 text-[10px] font-black uppercase tracking-widest text-slate-600 cursor-pointer">
                                <input id="toggle-alerts-g" type="checkbox" class="accent-blue-600" checked>
                                Alertas G
                            </label>
                        </div>
                        <div class="flex items-center gap-2">
                            <button id="fit-btn" class="bg-blue-600 hover:bg-blue-700 text-white font-black uppercase text-[10px] tracking-widest px-4 py-2.5 rounded-xl transition-all flex items-center gap-2">
                                <i data-lucide="maximize" size="14"></i> Ajustar
                            </button>
                            <button id="download-trip-btn" class="bg-slate-900 hover:bg-slate-800 text-white font-black uppercase text-[10px] tracking-widest px-4 py-2.5 rounded-xl transition-all flex items-center gap-2" disabled>
                                <i data-lucide="download" size="14"></i> JSON
                            </button>
                            <button id="delete-trip-btn" class="bg-red-600 hover:bg-red-700 text-white font-black uppercase text-[10px] tracking-widest px-4 py-2.5 rounded-xl transition-all flex items-center gap-2" disabled>
                                <i data-lucide="trash-2" size="14"></i> Excluir
                            </button>
                        </div>
                    </div>
            </section>

            <section class="bg-white rounded-[2rem] border border-slate-200 shadow-sm overflow-hidden min-h-0 flex flex-col">
                <div class="p-4 border-b border-slate-100 space-y-3">
                    <div class="flex items-center justify-between">
                        <div>
                            <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Eventos</p>
                            <p class="text-xs font-bold text-slate-500">Alertas e ocorrências registradas</p>
                        </div>
                        <div class="bg-slate-50 border border-slate-200 rounded-xl px-3 py-2 text-[10px] font-black text-slate-500 uppercase tracking-widest">
                            <span id="events-count">0</span>
                        </div>
                    </div>
                    <div class="flex items-center gap-2 flex-wrap">
                        <button id="events-filter-all" type="button" class="bg-slate-900 text-white px-3 py-2 rounded-xl text-[10px] font-black uppercase tracking-widest">
                            Todos
                        </button>
                        <button id="events-filter-db" type="button" class="bg-white border border-slate-200 text-slate-700 hover:bg-slate-50 px-3 py-2 rounded-xl text-[10px] font-black uppercase tracking-widest">
                            dB
                        </button>
                        <button id="events-filter-g" type="button" class="bg-white border border-slate-200 text-slate-700 hover:bg-slate-50 px-3 py-2 rounded-xl text-[10px] font-black uppercase tracking-widest">
                            G
                        </button>
                    </div>
                </div>
                <div id="events-list" class="p-3 space-y-2 flex-1 min-h-0 overflow-y-auto custom-scrollbar"></div>
            </section>
        </div>
    </main>

    <nav class="fixed bottom-0 left-0 right-0 bg-white border-t border-slate-100 py-2 px-2 pb-[calc(0.5rem+var(--sab))] z-50 lg:hidden">
        <div class="flex justify-between items-center w-full max-w-md mx-auto">
            <a href="admin-news.html" class="nav-link flex flex-col items-center gap-1 text-slate-300 hover:text-slate-500 transition-colors p-2">
                <i data-lucide="newspaper" size="20"></i>
                <span class="text-[9px] font-black uppercase">Notícias</span>
            </a>
            <a href="admin-painel.html" class="nav-link flex flex-col items-center gap-1 text-slate-300 hover:text-slate-500 transition-colors p-2">
                <i data-lucide="map" size="20"></i>
                <span class="text-[9px] font-black uppercase">Evidências</span>
            </a>
            <a href="telemetria-painel.html" class="nav-link active flex flex-col items-center gap-1 text-blue-600 transition-colors p-2 rounded-xl bg-blue-50">
                <i data-lucide="route" size="20" class="fill-current"></i>
                <span class="text-[9px] font-black uppercase">Telem.</span>
            </a>
            <a href="roadmap.html" class="nav-link flex flex-col items-center gap-1 text-slate-300 hover:text-slate-500 transition-colors p-2">
                <i data-lucide="milestone" size="20"></i>
                <span class="text-[9px] font-black uppercase">Roadmap</span>
            </a>
        </div>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { initializeFirestore, collection, query, orderBy, limit, onSnapshot, getDocs, doc, getDoc, deleteDoc, writeBatch } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { firebaseConfig } from "./js/config.js?v=3";

        const THRESHOLD_DB = 85;
        const THRESHOLD_G = 1.5;

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = initializeFirestore(app, { experimentalAutoDetectLongPolling: true, useFetchStreams: false });

        const tripsCountEl = document.getElementById('trips-count');
        const tripsListEl = document.getElementById('trips-list');
        const searchEl = document.getElementById('trip-search');
        const refreshBtn = document.getElementById('refresh-btn');

        const tripTitleEl = document.getElementById('trip-title');
        const tripSubtitleEl = document.getElementById('trip-subtitle');
        const chipStatusEl = document.getElementById('chip-status');
        const chipDistanceEl = document.getElementById('chip-distance');
        const chipDurationEl = document.getElementById('chip-duration');
        const chipMaxEl = document.getElementById('chip-max');

        const toggleAlertsDbEl = document.getElementById('toggle-alerts-db');
        const toggleAlertsGEl = document.getElementById('toggle-alerts-g');
        const fitBtn = document.getElementById('fit-btn');
        const downloadTripBtn = document.getElementById('download-trip-btn');
        const deleteTripBtn = document.getElementById('delete-trip-btn');

        const eventsCountEl = document.getElementById('events-count');
        const eventsListEl = document.getElementById('events-list');
        const eventsFilterAllBtn = document.getElementById('events-filter-all');
        const eventsFilterDbBtn = document.getElementById('events-filter-db');
        const eventsFilterGBtn = document.getElementById('events-filter-g');

        const userEmailEl = document.getElementById('user-email');
        const logoutBtn = document.getElementById('logout-btn');

        const BASE = ['artifacts', 'sentinela-stp', 'public', 'data', 'telemetria_viagens'];

        let trips = [];
        let selectedTripId = null;
        let selectedTrip = null;
        let selectedTripChunks = [];
        let selectedTripComputed = null;
        let eventsFilter = 'all';

        const map = L.map('map', { zoomControl: false }).setView([-27.5945, -48.5477], 13);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', { maxZoom: 20 }).addTo(map);

        const routeLayer = L.layerGroup().addTo(map);
        const alertsDbLayer = L.layerGroup().addTo(map);
        const alertsGLayer = L.layerGroup().addTo(map);
        const replayLayer = L.layerGroup().addTo(map);

        function escapeText(value) {
            return value == null ? '' : String(value);
        }

        function fmtKm(value) {
            const n = Number(value);
            if (!Number.isFinite(n)) return '0.00 km';
            return `${n.toFixed(2)} km`;
        }

        function fmtTimeFromMs(ms) {
            const s = Math.max(0, Math.floor(ms / 1000));
            const hh = String(Math.floor(s / 3600)).padStart(2, '0');
            const mm = String(Math.floor((s % 3600) / 60)).padStart(2, '0');
            const ss = String(s % 60).padStart(2, '0');
            return `${hh}:${mm}:${ss}`;
        }

        function fmtDate(value) {
            if (!value) return '—';
            if (typeof value === 'number') return new Date(value).toLocaleString('pt-BR');
            if (typeof value === 'string') {
                const d = new Date(value);
                if (!isNaN(d.getTime())) return d.toLocaleString('pt-BR');
                return value;
            }
            if (value.seconds) return new Date(value.seconds * 1000).toLocaleString('pt-BR');
            return '—';
        }

        function setActiveTripItem(id) {
            Array.from(tripsListEl.querySelectorAll('[data-trip-id]')).forEach((el) => {
                el.classList.toggle('ring-2', el.getAttribute('data-trip-id') === id);
                el.classList.toggle('ring-blue-500/30', el.getAttribute('data-trip-id') === id);
            });
        }

        function renderTrips() {
            const term = escapeText(searchEl.value).toLowerCase().trim();
            const filtered = trips.filter((t) => {
                if (!term) return true;
                const meta = t.meta || {};
                const key = [
                    t.id,
                    meta.linha,
                    meta.prefixo,
                    t.ownerUid
                ].map(escapeText).join(' ').toLowerCase();
                return key.includes(term);
            });

            tripsCountEl.textContent = String(filtered.length);
            tripsListEl.innerHTML = '';

            if (filtered.length === 0) {
                const empty = document.createElement('div');
                empty.className = 'text-center py-10 text-slate-400';
                empty.innerHTML = '<p class="text-xs font-bold uppercase tracking-widest">Nenhuma viagem encontrada</p>';
                tripsListEl.appendChild(empty);
                return;
            }

            filtered.forEach((t) => {
                const meta = t.meta || {};
                const line = escapeText(meta.linha || 'Linha não informada');
                const prefix = escapeText(meta.prefixo || 'S/N');
                const status = escapeText(t.status || '—');
                const started = fmtDate(t.startedAtMs || t.startedAt);
                const ended = t.endedAtMs || t.endedAt ? fmtDate(t.endedAtMs || t.endedAt) : '';
                const dist = t.summary && t.summary.distance_km != null ? fmtKm(t.summary.distance_km) : '';

                const card = document.createElement('button');
                card.type = 'button';
                card.className = 'w-full text-left bg-slate-50 hover:bg-slate-100 border border-slate-200 rounded-2xl p-3 transition-all';
                card.setAttribute('data-trip-id', t.id);

                const top = document.createElement('div');
                top.className = 'flex items-start justify-between gap-3';
                const left = document.createElement('div');
                left.className = 'min-w-0';
                const title = document.createElement('p');
                title.className = 'text-xs font-black text-slate-800 truncate';
                title.textContent = line;
                const sub = document.createElement('p');
                sub.className = 'text-[10px] font-bold text-slate-400 uppercase tracking-widest mt-1 truncate';
                sub.textContent = `#${prefix} • ${status}`;
                left.appendChild(title);
                left.appendChild(sub);

                const right = document.createElement('div');
                right.className = 'text-right flex flex-col items-end gap-1';
                const badge = document.createElement('span');
                badge.className = `text-[9px] font-black uppercase tracking-widest px-2 py-1 rounded-xl ${status === 'active' ? 'bg-blue-600 text-white' : 'bg-slate-200 text-slate-600'}`;
                badge.textContent = status === 'active' ? 'Ativa' : 'Final';
                right.appendChild(badge);
                if (dist) {
                    const dEl = document.createElement('span');
                    dEl.className = 'text-[10px] font-black text-slate-600 tabular-nums';
                    dEl.textContent = dist;
                    right.appendChild(dEl);
                }

                top.appendChild(left);
                top.appendChild(right);

                const bottom = document.createElement('div');
                bottom.className = 'mt-2 text-[10px] font-bold text-slate-500';
                bottom.textContent = ended ? `${started} → ${ended}` : started;

                card.appendChild(top);
                card.appendChild(bottom);

                card.addEventListener('click', () => selectTrip(t.id));
                tripsListEl.appendChild(card);
            });

            if (selectedTripId) setActiveTripItem(selectedTripId);
        }

        function clearMap() {
            routeLayer.clearLayers();
            alertsDbLayer.clearLayers();
            alertsGLayer.clearLayers();
            replayLayer.clearLayers();
            stopReplay();
            renderGChart([], [], null, null);
        }

        const replayToggleBtn = document.getElementById('replay-toggle');
        const replaySliderEl = document.getElementById('replay-slider');
        const replayTimeEl = document.getElementById('replay-time');
        const replaySpeedEl = document.getElementById('replay-speed');
        const replayFollowEl = document.getElementById('replay-follow');

        const gChartSvg = document.getElementById('g-chart');
        const gChartValueEl = document.getElementById('g-chart-value');
        const gChartRangeEl = document.getElementById('g-chart-range');

        const replayState = {
            playing: false,
            speed: 1,
            startTs: null,
            endTs: null,
            tMs: 0,
            gps: [],
            samples: [],
            raf: null,
            lastFrameAt: null,
            marker: null,
            cursor: null,
            cursorDot: null,
            chart: {
                viewW: 320,
                viewH: 120,
                padL: 26,
                padR: 26,
                padT: 10,
                padB: 18,
                gMax: 2,
                dbMin: 30,
                dbMax: 110,
                startTs: null,
                endTs: null,
                hasDb: false
            }
        };

        function fmtMmSs(ms) {
            const s = Math.max(0, Math.floor(ms / 1000));
            const mm = String(Math.floor(s / 60)).padStart(2, '0');
            const ss = String(s % 60).padStart(2, '0');
            return `${mm}:${ss}`;
        }

        function clamp(n, min, max) {
            return Math.max(min, Math.min(max, n));
        }

        function bisectByTs(arr, ts) {
            let lo = 0;
            let hi = arr.length - 1;
            while (lo < hi) {
                const mid = Math.floor((lo + hi + 1) / 2);
                if (arr[mid].ts <= ts) lo = mid;
                else hi = mid - 1;
            }
            return lo;
        }

        function nearestByTs(arr, ts) {
            if (!arr.length) return null;
            const i = bisectByTs(arr, ts);
            const a = arr[i];
            const b = i + 1 < arr.length ? arr[i + 1] : null;
            if (!b) return a;
            return Math.abs(a.ts - ts) <= Math.abs(b.ts - ts) ? a : b;
        }

        function stopReplay() {
            replayState.playing = false;
            replayState.lastFrameAt = null;
            if (replayState.raf) cancelAnimationFrame(replayState.raf);
            replayState.raf = null;
            if (replayToggleBtn) {
                replayToggleBtn.innerHTML = '<i data-lucide="play" size="14"></i>';
                lucide.createIcons();
            }
        }

        function setReplayTimeMs(nextMs, fromUser = false) {
            if (replayState.startTs == null || replayState.endTs == null) return;
            const dur = Math.max(0, replayState.endTs - replayState.startTs);
            replayState.tMs = clamp(nextMs, 0, dur);
            if (replaySliderEl) replaySliderEl.value = String(Math.round(replayState.tMs));
            if (replayTimeEl) replayTimeEl.textContent = fmtMmSs(replayState.tMs);

            const ts = replayState.startTs + replayState.tMs;
            if (replayState.gps.length >= 2 && replayState.marker) {
                const idx = bisectByTs(replayState.gps, ts);
                const p1 = replayState.gps[idx];
                const p2 = idx + 1 < replayState.gps.length ? replayState.gps[idx + 1] : null;
                let lat = p1.lat;
                let lng = p1.lng;
                if (p2 && p2.ts > p1.ts) {
                    const f = clamp((ts - p1.ts) / (p2.ts - p1.ts), 0, 1);
                    lat = p1.lat + (p2.lat - p1.lat) * f;
                    lng = p1.lng + (p2.lng - p1.lng) * f;
                }
                replayState.marker.setLatLng([lat, lng]);
                if (replayFollowEl && replayFollowEl.checked && !fromUser) {
                    map.panTo([lat, lng], { animate: true, duration: 0.25 });
                }
            }

            updateChartCursor(ts);
        }

        function tickReplay(now) {
            if (!replayState.playing) return;
            const last = replayState.lastFrameAt == null ? now : replayState.lastFrameAt;
            replayState.lastFrameAt = now;
            const dt = Math.max(0, now - last);
            const step = dt * replayState.speed;
            setReplayTimeMs(replayState.tMs + step);
            const dur = replayState.endTs - replayState.startTs;
            if (replayState.tMs >= dur) {
                stopReplay();
                return;
            }
            replayState.raf = requestAnimationFrame(tickReplay);
        }

        function renderGChart(gSeries, dbSeries, startTs, endTs) {
            if (!gChartSvg) return;
            gChartSvg.innerHTML = '';
            replayState.chart.startTs = startTs;
            replayState.chart.endTs = endTs;
            replayState.chart.hasDb = dbSeries.length > 0;

            const W = replayState.chart.viewW;
            const H = replayState.chart.viewH;
            const L = replayState.chart.padL;
            const R = replayState.chart.padR;
            const T = replayState.chart.padT;
            const B = replayState.chart.padB;
            const iw = W - L - R;
            const ih = H - T - B;

            const bg = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
            bg.setAttribute('x', '0');
            bg.setAttribute('y', '0');
            bg.setAttribute('width', String(W));
            bg.setAttribute('height', String(H));
            bg.setAttribute('rx', '12');
            bg.setAttribute('fill', '#ffffff');
            bg.setAttribute('opacity', '0.0');
            gChartSvg.appendChild(bg);

            if (!gSeries.length || startTs == null || endTs == null || endTs <= startTs) {
                if (gChartValueEl) gChartValueEl.textContent = '—';
                if (gChartRangeEl) gChartRangeEl.textContent = 'Sem dados';
                return;
            }

            const gMax = Math.max(1.5, ...gSeries.map((p) => p.g || 0));
            replayState.chart.gMax = Math.min(6, Math.max(2, gMax * 1.15));

            const xForTs = (ts) => L + ((ts - startTs) / (endTs - startTs)) * iw;
            const yForG = (g) => T + (1 - clamp(g / replayState.chart.gMax, 0, 1)) * ih;
            const yForDb = (db) => T + (1 - clamp((db - replayState.chart.dbMin) / (replayState.chart.dbMax - replayState.chart.dbMin), 0, 1)) * ih;

            const grid = document.createElementNS('http://www.w3.org/2000/svg', 'path');
            grid.setAttribute('fill', 'none');
            grid.setAttribute('stroke', '#e2e8f0');
            grid.setAttribute('stroke-width', '1');
            const gLines = 4;
            let d = '';
            for (let i = 0; i <= gLines; i++) {
                const y = T + (ih / gLines) * i;
                d += `M ${L} ${y} L ${W - R} ${y} `;
            }
            grid.setAttribute('d', d.trim());
            gChartSvg.appendChild(grid);

            const makePath = (pts, yFn) => {
                const maxPts = 220;
                const step = Math.max(1, Math.floor(pts.length / maxPts));
                let path = '';
                for (let i = 0; i < pts.length; i += step) {
                    const p = pts[i];
                    const x = xForTs(p.ts);
                    const y = yFn(p.value);
                    path += `${path ? 'L' : 'M'} ${x.toFixed(2)} ${y.toFixed(2)} `;
                }
                return path.trim();
            };

            const gPath = document.createElementNS('http://www.w3.org/2000/svg', 'path');
            gPath.setAttribute('fill', 'none');
            gPath.setAttribute('stroke', '#f97316');
            gPath.setAttribute('stroke-width', '2.5');
            gPath.setAttribute('stroke-linecap', 'round');
            gPath.setAttribute('stroke-linejoin', 'round');
            gPath.setAttribute('d', makePath(gSeries.map((p) => ({ ts: p.ts, value: p.g })), yForG));
            gChartSvg.appendChild(gPath);

            if (dbSeries.length) {
                const dbPath = document.createElementNS('http://www.w3.org/2000/svg', 'path');
                dbPath.setAttribute('fill', 'none');
                dbPath.setAttribute('stroke', '#2563eb');
                dbPath.setAttribute('stroke-width', '2');
                dbPath.setAttribute('stroke-dasharray', '4 4');
                dbPath.setAttribute('stroke-linecap', 'round');
                dbPath.setAttribute('stroke-linejoin', 'round');
                dbPath.setAttribute('d', makePath(dbSeries.map((p) => ({ ts: p.ts, value: p.db })), yForDb));
                gChartSvg.appendChild(dbPath);
            }

            const axisLeft = document.createElementNS('http://www.w3.org/2000/svg', 'text');
            axisLeft.setAttribute('x', String(L));
            axisLeft.setAttribute('y', String(H - 4));
            axisLeft.setAttribute('fill', '#64748b');
            axisLeft.setAttribute('font-size', '10');
            axisLeft.setAttribute('font-weight', '900');
            axisLeft.textContent = `0–${replayState.chart.gMax.toFixed(1)}G`;
            gChartSvg.appendChild(axisLeft);

            const axisRight = document.createElementNS('http://www.w3.org/2000/svg', 'text');
            axisRight.setAttribute('x', String(W - R));
            axisRight.setAttribute('y', String(H - 4));
            axisRight.setAttribute('fill', '#64748b');
            axisRight.setAttribute('font-size', '10');
            axisRight.setAttribute('font-weight', '900');
            axisRight.setAttribute('text-anchor', 'end');
            axisRight.textContent = dbSeries.length ? `${replayState.chart.dbMin}–${replayState.chart.dbMax}dB` : '';
            gChartSvg.appendChild(axisRight);

            const cursor = document.createElementNS('http://www.w3.org/2000/svg', 'line');
            cursor.setAttribute('x1', String(L));
            cursor.setAttribute('x2', String(L));
            cursor.setAttribute('y1', String(T));
            cursor.setAttribute('y2', String(T + ih));
            cursor.setAttribute('stroke', '#0f172a');
            cursor.setAttribute('stroke-width', '1');
            cursor.setAttribute('opacity', '0.25');
            gChartSvg.appendChild(cursor);

            const dot = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
            dot.setAttribute('cx', String(L));
            dot.setAttribute('cy', String(T + ih));
            dot.setAttribute('r', '3.5');
            dot.setAttribute('fill', '#0f172a');
            dot.setAttribute('opacity', '0.6');
            gChartSvg.appendChild(dot);

            replayState.cursor = cursor;
            replayState.cursorDot = dot;

            if (gChartRangeEl) gChartRangeEl.textContent = `MAX ${gMax.toFixed(2)}G`;
        }

        function updateChartCursor(ts) {
            if (!replayState.cursor || !replayState.cursorDot) return;
            if (replayState.chart.startTs == null || replayState.chart.endTs == null) return;
            const startTs = replayState.chart.startTs;
            const endTs = replayState.chart.endTs;
            if (endTs <= startTs) return;
            const W = replayState.chart.viewW;
            const L = replayState.chart.padL;
            const R = replayState.chart.padR;
            const T = replayState.chart.padT;
            const B = replayState.chart.padB;
            const iw = W - L - R;
            const ih = replayState.chart.viewH - T - B;
            const x = L + ((ts - startTs) / (endTs - startTs)) * iw;
            const cx = clamp(x, L, W - R);
            replayState.cursor.setAttribute('x1', String(cx));
            replayState.cursor.setAttribute('x2', String(cx));

            const nearest = nearestByTs(replayState.samples, ts);
            const g = nearest && nearest.g != null ? Number(nearest.g) : null;
            if (Number.isFinite(g)) {
                const y = T + (1 - clamp(g / replayState.chart.gMax, 0, 1)) * ih;
                replayState.cursorDot.setAttribute('cx', String(cx));
                replayState.cursorDot.setAttribute('cy', String(y));
            }

            const db = nearest && nearest.db != null ? Number(nearest.db) : null;
            const gTxt = Number.isFinite(g) ? `${g.toFixed(2)}G` : '—';
            const dbTxt = Number.isFinite(db) ? `${Math.round(db)}dB` : '—';
            if (gChartValueEl) gChartValueEl.textContent = `${gTxt} • ${dbTxt}`;
        }

        function initReplay(computed) {
            stopReplay();
            replayLayer.clearLayers();
            replayState.marker = null;
            replayState.startTs = null;
            replayState.endTs = null;
            replayState.tMs = 0;

            const gps = (computed.gps || []).filter((p) => p && p.lat != null && p.lng != null && p.ts != null)
                .map((p) => ({ lat: Number(p.lat), lng: Number(p.lng), ts: Number(p.ts) }))
                .filter((p) => Number.isFinite(p.lat) && Number.isFinite(p.lng) && Number.isFinite(p.ts))
                .sort((a, b) => a.ts - b.ts);

            const samples = (computed.samples || []).filter((s) => s && s.ts != null)
                .map((s) => ({ ts: Number(s.ts), g: s.g == null ? null : Number(s.g), db: s.db == null ? null : Number(s.db) }))
                .filter((s) => Number.isFinite(s.ts))
                .sort((a, b) => a.ts - b.ts);

            replayState.gps = gps;
            replayState.samples = samples;

            if (gps.length >= 2) {
                replayState.startTs = gps[0].ts;
                replayState.endTs = gps[gps.length - 1].ts;
                const start = gps[0];
                const m = L.circleMarker([start.lat, start.lng], { radius: 8, color: '#0f172a', weight: 2, fillColor: '#f59e0b', fillOpacity: 1 });
                replayLayer.addLayer(m);
                replayState.marker = m;
                if (replaySliderEl) {
                    replaySliderEl.disabled = false;
                    replaySliderEl.min = '0';
                    replaySliderEl.max = String(Math.max(0, replayState.endTs - replayState.startTs));
                    replaySliderEl.value = '0';
                }
                if (replayTimeEl) replayTimeEl.textContent = '00:00';
            } else {
                if (replaySliderEl) {
                    replaySliderEl.disabled = true;
                    replaySliderEl.min = '0';
                    replaySliderEl.max = '0';
                    replaySliderEl.value = '0';
                }
                if (replayTimeEl) replayTimeEl.textContent = '—';
            }

            const startTs = replayState.startTs != null ? replayState.startTs : (samples.length ? samples[0].ts : null);
            const endTs = replayState.endTs != null ? replayState.endTs : (samples.length ? samples[samples.length - 1].ts : null);
            const gSeries = samples.filter((s) => Number.isFinite(s.g));
            const dbSeries = samples.filter((s) => Number.isFinite(s.db));
            renderGChart(gSeries, dbSeries, startTs, endTs);
            if (startTs != null) updateChartCursor(startTs);
        }

        if (replayToggleBtn) {
            replayToggleBtn.addEventListener('click', () => {
                if (!replayState.gps.length || replayState.startTs == null || replayState.endTs == null) return;
                if (replayState.playing) {
                    stopReplay();
                } else {
                    replayState.playing = true;
                    replayState.lastFrameAt = null;
                    replayState.speed = replaySpeedEl ? Number(replaySpeedEl.value) || 1 : 1;
                    replayToggleBtn.innerHTML = '<i data-lucide="pause" size="14"></i>';
                    lucide.createIcons();
                    replayState.raf = requestAnimationFrame(tickReplay);
                }
            });
        }

        if (replaySpeedEl) {
            replaySpeedEl.addEventListener('change', () => {
                replayState.speed = Number(replaySpeedEl.value) || 1;
            });
        }

        if (replaySliderEl) {
            replaySliderEl.addEventListener('input', () => {
                if (!replayState.gps.length || replayState.startTs == null || replayState.endTs == null) return;
                stopReplay();
                const v = Number(replaySliderEl.value) || 0;
                setReplayTimeMs(v, true);
            });
        }

        function renderEventsList(items) {
            eventsListEl.innerHTML = '';
            const filtered = items.filter((e) => {
                if (eventsFilter === 'all') return true;
                const tag = e && e.tag ? String(e.tag) : '';
                if (eventsFilter === 'db') return tag === 'dB';
                if (eventsFilter === 'g') return tag === 'G';
                return true;
            });
            eventsCountEl.textContent = String(filtered.length);

            if (filtered.length === 0) {
                const empty = document.createElement('div');
                empty.className = 'text-center py-10 text-slate-400';
                empty.innerHTML = '<p class="text-xs font-bold uppercase tracking-widest">Sem eventos</p>';
                eventsListEl.appendChild(empty);
                return;
            }

            filtered.slice().reverse().forEach((e) => {
                const row = document.createElement('div');
                row.className = 'bg-slate-50 border border-slate-200 rounded-2xl p-3 flex items-start justify-between gap-3';

                const left = document.createElement('div');
                left.className = 'min-w-0';
                const kind = document.createElement('p');
                kind.className = 'text-[10px] font-black text-slate-400 uppercase tracking-widest';
                kind.textContent = escapeText(e.kind || 'EVENTO');
                const msg = document.createElement('p');
                msg.className = 'text-sm font-bold text-slate-800 leading-tight break-words';
                msg.textContent = escapeText(e.message || '');
                const meta = document.createElement('p');
                meta.className = 'text-[10px] font-bold text-slate-400 mt-1';
                meta.textContent = fmtDate(e.ts);
                left.appendChild(kind);
                left.appendChild(msg);
                left.appendChild(meta);

                const tag = document.createElement('span');
                tag.className = 'text-[10px] font-black uppercase tracking-widest px-2 py-1 rounded-xl bg-white border border-slate-200 text-slate-600';
                tag.textContent = escapeText(e.tag || 'LOG');

                row.appendChild(left);
                row.appendChild(tag);

                if (e.lat != null && e.lng != null) {
                    row.addEventListener('click', () => {
                        map.setView([e.lat, e.lng], Math.max(map.getZoom(), 16), { animate: true });
                    });
                }

                eventsListEl.appendChild(row);
            });
        }

        function computeTripData(chunks, thresholds) {
            const thresholdDb = thresholds && thresholds.db != null ? Number(thresholds.db) : THRESHOLD_DB;
            const thresholdG = thresholds && thresholds.g != null ? Number(thresholds.g) : THRESHOLD_G;
            const gps = [];
            const samples = [];
            const events = [];

            chunks.forEach((c) => {
                (c.gps || []).forEach((p) => gps.push(p));
                (c.samples || []).forEach((s) => samples.push(s));
                (c.events || []).forEach((e) => events.push(e));
            });

            const alertDbPoints = [];
            const alertGPoints = [];

            let maxDb = null;
            let maxG = null;

            const parseTsMs = (value) => {
                if (value == null) return null;
                if (typeof value === 'number') return Number.isFinite(value) ? value : null;
                if (typeof value === 'string') {
                    const trimmed = value.trim();
                    if (trimmed === '') return null;
                    const asNum = Number(trimmed);
                    if (Number.isFinite(asNum)) return asNum;
                    const parsed = Date.parse(trimmed);
                    return Number.isFinite(parsed) ? parsed : null;
                }
                if (typeof value === 'object' && value.seconds != null) {
                    const ms = Number(value.seconds) * 1000;
                    return Number.isFinite(ms) ? ms : null;
                }
                return null;
            };

            const parseNumber = (value) => {
                if (value == null) return null;
                if (typeof value === 'number') return Number.isFinite(value) ? value : null;
                if (typeof value === 'string') {
                    const norm = value.replace(',', '.');
                    const n = Number(norm);
                    return Number.isFinite(n) ? n : null;
                }
                return null;
            };

            const parseGFromMessage = (msg) => {
                const s = msg == null ? '' : String(msg);
                const m1 = s.match(/pico\s+([0-9]+(?:[.,][0-9]+)?)\s*G/i);
                if (m1 && m1[1]) return parseNumber(m1[1]);
                const m2 = s.match(/([0-9]+(?:[.,][0-9]+)?)\s*G/i);
                if (m2 && m2[1]) return parseNumber(m2[1]);
                return null;
            };

            const parseDbFromMessage = (msg) => {
                const s = msg == null ? '' : String(msg);
                const m1 = s.match(/\(([0-9]+(?:[.,][0-9]+)?)\s*dB\)/i);
                if (m1 && m1[1]) return parseNumber(m1[1]);
                const m2 = s.match(/([0-9]+(?:[.,][0-9]+)?)\s*dB/i);
                if (m2 && m2[1]) return parseNumber(m2[1]);
                return null;
            };

            const samplePoints = samples
                .map((s) => ({
                    ts: parseTsMs(s.ts),
                    lat: s.lat == null ? null : Number(s.lat),
                    lng: s.lng == null ? null : Number(s.lng)
                }))
                .filter((p) => p.ts != null && Number.isFinite(p.lat) && Number.isFinite(p.lng))
                .sort((a, b) => a.ts - b.ts);

            const nearestSamplePoint = (tsMs) => {
                if (!samplePoints.length || tsMs == null) return null;
                let lo = 0;
                let hi = samplePoints.length - 1;
                while (lo < hi) {
                    const mid = Math.floor((lo + hi) / 2);
                    if (samplePoints[mid].ts < tsMs) lo = mid + 1;
                    else hi = mid;
                }
                const cand1 = samplePoints[lo];
                const cand2 = lo > 0 ? samplePoints[lo - 1] : null;
                let best = cand1;
                if (cand2 && Math.abs(cand2.ts - tsMs) < Math.abs(cand1.ts - tsMs)) best = cand2;
                const toleranceMs = 15000;
                if (Math.abs(best.ts - tsMs) > toleranceMs) return null;
                return best;
            };

            const keyForPoint = (p) => {
                const lat = typeof p.lat === 'number' ? Math.round(p.lat * 1e5) : 'x';
                const lng = typeof p.lng === 'number' ? Math.round(p.lng * 1e5) : 'y';
                const ts = p.ts != null ? Math.round(Number(p.ts) / 5000) : 't';
                return `${lat}:${lng}:${ts}`;
            };

            const seenDb = new Set();
            const seenG = new Set();

            const enrichedEvents = events.map((e) => {
                const lat = e && e.lat != null ? Number(e.lat) : null;
                const lng = e && e.lng != null ? Number(e.lng) : null;
                if (Number.isFinite(lat) && Number.isFinite(lng)) return { ...e, lat, lng };

                const tsMs = e && e.tsMs != null ? parseTsMs(e.tsMs) : parseTsMs(e && e.ts);
                const nearest = nearestSamplePoint(tsMs);
                if (!nearest) return e;
                return { ...e, lat: nearest.lat, lng: nearest.lng, approx: true };
            });

            enrichedEvents.forEach((e) => {
                const tag = (e && e.tag) ? String(e.tag) : '';
                const lat = e && e.lat != null ? Number(e.lat) : null;
                const lng = e && e.lng != null ? Number(e.lng) : null;
                const ts = e && e.tsMs != null ? parseTsMs(e.tsMs) : parseTsMs(e && e.ts);

                if (lat == null || lng == null || !Number.isFinite(lat) || !Number.isFinite(lng)) return;

                if (tag === 'dB') {
                    const dbv = (e && e.db != null ? parseNumber(e.db) : null) ??
                        (e && e.value != null ? parseNumber(e.value) : null) ??
                        parseDbFromMessage(e && e.message);
                    if (Number.isFinite(dbv) && dbv >= thresholdDb) {
                        const p = { lat, lng, ts, value: dbv };
                        const k = keyForPoint(p);
                        if (!seenDb.has(k)) {
                            seenDb.add(k);
                            alertDbPoints.push(p);
                        }
                    }
                }

                if (tag === 'G') {
                    const gv = (e && e.g != null ? parseNumber(e.g) : null) ??
                        (e && e.value != null ? parseNumber(e.value) : null) ??
                        parseGFromMessage(e && e.message);
                    if (Number.isFinite(gv) && gv >= thresholdG) {
                        const p = { lat, lng, ts, value: gv };
                        const k = keyForPoint(p);
                        if (!seenG.has(k)) {
                            seenG.add(k);
                            alertGPoints.push(p);
                        }
                    }
                }
            });

            samples.forEach((s) => {
                const dbv = Number(s.db);
                const gv = Number(s.g);
                if (Number.isFinite(dbv)) maxDb = maxDb == null ? dbv : Math.max(maxDb, dbv);
                if (Number.isFinite(gv)) maxG = maxG == null ? gv : Math.max(maxG, gv);
                if (Number.isFinite(dbv) && dbv >= thresholdDb && s.lat != null && s.lng != null) {
                    const p = { lat: Number(s.lat), lng: Number(s.lng), ts: s.ts, value: dbv };
                    const k = keyForPoint(p);
                    if (!seenDb.has(k)) {
                        seenDb.add(k);
                        alertDbPoints.push(p);
                    }
                }
                if (Number.isFinite(gv) && gv >= thresholdG && s.lat != null && s.lng != null) {
                    const p = { lat: Number(s.lat), lng: Number(s.lng), ts: s.ts, value: gv };
                    const k = keyForPoint(p);
                    if (!seenG.has(k)) {
                        seenG.add(k);
                        alertGPoints.push(p);
                    }
                }
            });

            return { gps, samples, events: enrichedEvents, maxDb, maxG, alertDbPoints, alertGPoints };
        }

        function renderMapAndDetails(tripDoc, computed) {
            clearMap();

            if (!tripDoc) {
                tripTitleEl.textContent = 'Nenhuma';
                tripSubtitleEl.textContent = '—';
                chipStatusEl.textContent = 'status';
                chipDistanceEl.textContent = '0.00 km';
                chipDurationEl.textContent = '00:00:00';
                chipMaxEl.textContent = 'max';
                downloadTripBtn.disabled = true;
                deleteTripBtn.disabled = true;
                renderEventsList([]);
                return;
            }

            const meta = tripDoc.meta || {};
            const line = escapeText(meta.linha || 'Linha não informada');
            const prefix = escapeText(meta.prefixo || 'S/N');
            const status = escapeText(tripDoc.status || '—');
            const started = tripDoc.startedAtMs || tripDoc.startedAt;
            const ended = tripDoc.endedAtMs || tripDoc.endedAt;

            tripTitleEl.textContent = line;
            tripSubtitleEl.textContent = `#${prefix} • ${escapeText(tripDoc.ownerUid || '')}`;

            chipStatusEl.textContent = status === 'active' ? 'Ativa' : 'Final';
            chipStatusEl.className = `px-3 py-2 rounded-xl text-[10px] font-black uppercase tracking-widest ${status === 'active' ? 'bg-blue-600 text-white' : 'bg-slate-100 text-slate-600'}`;

            const distKm = tripDoc.summary && tripDoc.summary.distance_km != null ? Number(tripDoc.summary.distance_km) : null;
            chipDistanceEl.textContent = fmtKm(distKm || 0);

            const durationMs = tripDoc.summary && tripDoc.summary.duration_ms != null ? Number(tripDoc.summary.duration_ms) : (
                typeof started === 'number' && typeof ended === 'number' ? Math.max(0, ended - started) : null
            );
            chipDurationEl.textContent = durationMs == null ? '00:00:00' : fmtTimeFromMs(durationMs);

            const maxDb = tripDoc.summary && tripDoc.summary.max_db != null ? Number(tripDoc.summary.max_db) : computed.maxDb;
            const maxG = tripDoc.summary && tripDoc.summary.max_g != null ? Number(tripDoc.summary.max_g) : computed.maxG;
            chipMaxEl.textContent = `MAX ${Number.isFinite(maxDb) ? `${Math.round(maxDb)}dB` : '—'} / ${Number.isFinite(maxG) ? `${maxG.toFixed(2)}G` : '—'}`;

            const gpsPoints = computed.gps.filter((p) => p && p.lat != null && p.lng != null).map((p) => [p.lat, p.lng]);

            if (gpsPoints.length >= 2) {
                const poly = L.polyline(gpsPoints, { color: '#2563eb', weight: 4, opacity: 0.9 });
                routeLayer.addLayer(poly);

                const start = gpsPoints[0];
                const end = gpsPoints[gpsPoints.length - 1];
                routeLayer.addLayer(L.circleMarker(start, { radius: 7, color: '#0f172a', weight: 2, fillColor: '#22c55e', fillOpacity: 1 }));
                routeLayer.addLayer(L.circleMarker(end, { radius: 7, color: '#0f172a', weight: 2, fillColor: '#ef4444', fillOpacity: 1 }));

                try {
                    map.fitBounds(poly.getBounds(), { padding: [24, 24] });
                } catch {}
            } else {
                map.setView([-27.5945, -48.5477], 13);
            }

            if (toggleAlertsDbEl.checked) {
                computed.alertDbPoints.forEach((p) => {
                    const m = L.circleMarker([p.lat, p.lng], { radius: 6, color: '#991b1b', weight: 2, fillColor: '#ef4444', fillOpacity: 0.9 });
                    m.bindTooltip(`${Math.round(p.value)} dB`, { direction: 'top' });
                    alertsDbLayer.addLayer(m);
                });
            }

            if (toggleAlertsGEl.checked) {
                computed.alertGPoints.forEach((p) => {
                    const m = L.circleMarker([p.lat, p.lng], { radius: 6, color: '#7c2d12', weight: 2, fillColor: '#f97316', fillOpacity: 0.9 });
                    m.bindTooltip(`${p.value.toFixed(2)} G`, { direction: 'top' });
                    alertsGLayer.addLayer(m);
                });
            }

            initReplay(computed);
            renderEventsList(computed.events || []);
            downloadTripBtn.disabled = false;
            deleteTripBtn.disabled = false;
        }

        async function deleteTrip(tripDoc) {
            if (!tripDoc) return;
            const meta = tripDoc.meta || {};
            const line = escapeText(meta.linha || 'Linha não informada');
            const prefix = escapeText(meta.prefixo || 'S/N');
            const tripId = tripDoc.id;

            const ok = confirm(`Excluir permanentemente esta corrida?\n\n${line}\n#${prefix}\nID: ${tripId}\n\nIsso removerá também os dados de telemetria (chunks).`);
            if (!ok) return;
            const typed = prompt('Digite APAGAR para confirmar a exclusão:');
            if (typed !== 'APAGAR') return;

            deleteTripBtn.disabled = true;
            downloadTripBtn.disabled = true;

            const chunksCol = collection(db, ...BASE, tripId, 'chunks');

            while (true) {
                const snap = await getDocs(query(chunksCol, limit(400)));
                if (snap.empty) break;
                const batch = writeBatch(db);
                snap.docs.forEach((d) => batch.delete(d.ref));
                await batch.commit();
            }

            await deleteDoc(doc(db, ...BASE, tripId));

            if (selectedTripId === tripId) {
                selectedTripId = null;
                selectedTrip = null;
                selectedTripChunks = [];
                selectedTripComputed = null;
                setActiveTripItem('');
                renderMapAndDetails(null, { gps: [], events: [], maxDb: null, maxG: null, alertDbPoints: [], alertGPoints: [] });
            }
        }

        async function loadTripChunks(tripId) {
            const chunksCol = collection(db, ...BASE, tripId, 'chunks');
            const q = query(chunksCol, orderBy('createdAt', 'asc'), limit(500));
            const snap = await getDocs(q);
            return snap.docs.map((d) => d.data());
        }

        async function selectTrip(tripId) {
            selectedTripId = tripId;
            setActiveTripItem(tripId);
            downloadTripBtn.disabled = true;

            const tripRef = doc(db, ...BASE, tripId);
            const tripSnap = await getDoc(tripRef);
            if (!tripSnap.exists()) {
                selectedTrip = null;
                selectedTripChunks = [];
                selectedTripComputed = null;
                renderMapAndDetails(null, { gps: [], events: [], maxDb: null, maxG: null, alertDbPoints: [], alertGPoints: [] });
                return;
            }

            selectedTrip = { id: tripId, ...tripSnap.data() };
            selectedTripChunks = await loadTripChunks(tripId);
            selectedTripComputed = computeTripData(selectedTripChunks, selectedTrip.meta && selectedTrip.meta.thresholds ? selectedTrip.meta.thresholds : null);
            renderMapAndDetails(selectedTrip, selectedTripComputed);
        }

        function setupListeners() {
            searchEl.addEventListener('input', () => renderTrips());
            refreshBtn.addEventListener('click', () => renderTrips());

            toggleAlertsDbEl.addEventListener('change', () => {
                if (!selectedTrip) return;
                renderMapAndDetails(selectedTrip, selectedTripComputed);
            });

            toggleAlertsGEl.addEventListener('change', () => {
                if (!selectedTrip) return;
                renderMapAndDetails(selectedTrip, selectedTripComputed);
            });

            const setEventsFilter = (next) => {
                eventsFilter = next;
                const active = 'bg-slate-900 text-white';
                const inactive = 'bg-white border border-slate-200 text-slate-700 hover:bg-slate-50';
                eventsFilterAllBtn.className = `${next === 'all' ? active : inactive} px-3 py-2 rounded-xl text-[10px] font-black uppercase tracking-widest`;
                eventsFilterDbBtn.className = `${next === 'db' ? active : inactive} px-3 py-2 rounded-xl text-[10px] font-black uppercase tracking-widest`;
                eventsFilterGBtn.className = `${next === 'g' ? active : inactive} px-3 py-2 rounded-xl text-[10px] font-black uppercase tracking-widest`;
                if (selectedTripComputed) renderEventsList(selectedTripComputed.events || []);
            };

            eventsFilterAllBtn.addEventListener('click', () => setEventsFilter('all'));
            eventsFilterDbBtn.addEventListener('click', () => setEventsFilter('db'));
            eventsFilterGBtn.addEventListener('click', () => setEventsFilter('g'));

            fitBtn.addEventListener('click', () => {
                const poly = routeLayer.getLayers().find((l) => l instanceof L.Polyline);
                if (poly) {
                    try {
                        map.fitBounds(poly.getBounds(), { padding: [24, 24] });
                    } catch {}
                }
            });

            downloadTripBtn.addEventListener('click', () => {
                if (!selectedTrip) return;
                const payload = {
                    version: 1,
                    exportedAt: new Date().toISOString(),
                    trip: selectedTrip,
                    chunks: selectedTripChunks
                };
                const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json;charset=utf-8' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                const pad = (n) => String(n).padStart(2, '0');
                const dt = new Date();
                a.download = `telemetria_painel_${dt.getFullYear()}-${pad(dt.getMonth() + 1)}-${pad(dt.getDate())}_${pad(dt.getHours())}-${pad(dt.getMinutes())}-${pad(dt.getSeconds())}.json`;
                a.href = url;
                document.body.appendChild(a);
                a.click();
                a.remove();
                URL.revokeObjectURL(url);
            });

            deleteTripBtn.addEventListener('click', async () => {
                try {
                    if (!selectedTrip) return;
                    await deleteTrip(selectedTrip);
                } catch (e) {
                    console.error(e);
                    alert('Erro ao excluir corrida.');
                } finally {
                    if (!selectedTrip) {
                        deleteTripBtn.disabled = true;
                        downloadTripBtn.disabled = true;
                    }
                }
            });

            if (logoutBtn) {
                logoutBtn.addEventListener('click', () => {
                    signOut(auth).finally(() => window.location.href = 'login.html');
                });
            }
        }

        function startTripsListener() {
            const tripsCol = collection(db, ...BASE);
            const q = query(tripsCol, orderBy('startedAtMs', 'desc'), limit(200));
            onSnapshot(q, (snap) => {
                trips = snap.docs.map((d) => ({ id: d.id, ...d.data() }));
                renderTrips();
                if (!selectedTripId && trips.length > 0) {
                    selectTrip(trips[0].id);
                }
            }, (err) => {
                console.error(err);
                tripsListEl.innerHTML = '<div class="text-center py-10 text-red-500"><p class="text-xs font-bold uppercase tracking-widest">Erro ao carregar</p></div>';
            });
        }

        onAuthStateChanged(auth, (user) => {
            if (user && !user.isAnonymous) {
                document.body.classList.remove('opacity-0');
                if (userEmailEl) userEmailEl.textContent = user.email || '';
                setupListeners();
                startTripsListener();
                lucide.createIcons();
                setTimeout(() => map.invalidateSize(), 50);
            } else {
                if (user) signOut(auth);
                window.location.href = 'login.html?redirect=telemetria-painel.html';
            }
        });
    </script>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            lucide.createIcons();
        });
    </script>
    <script src="version-display.js"></script>
</body>
</html>
